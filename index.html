  </div>`;
}

// ── Budget Sheet ──
let bprevEditId=null;
let bprevPeriod='monthly';
let bprevItems=[];

function openBPrev(id=null){
  const now=new Date();
  bprevEditId=id;
  const existing=id?BUDGETS.find(b=>b.id===id):getActiveBudget();
  if(existing){
    bprevPeriod=existing.period;
    bprevItems=[...existing.items.map(i=>({...i}))];
  } else {
    bprevPeriod='monthly';
    bprevItems=[];
  }
  document.getElementById('bprev-title').textContent=existing?'Modifier le budget':'Nouveau budget';
  renderBPrevForm(existing);
  document.getElementById('bprev-bg').classList.add('open');
}
function closeBPrev(){document.getElementById('bprev-bg').classList.remove('open');}

function renderBPrevForm(existing=null){
  const now=new Date();
  const allCats=[
    ...BPREV_CATS_EXP.map(c=>({cat:c,type:'expense'})),
    ...BPREV_CATS_SAV.map(c=>({cat:c,type:'savings'})),
    {cat:'Revenu mensuel',type:'income'},
  ];

  // Merge existing items with all cats — show only cats that have a value OR all if no items
  const itemMap={};
  bprevItems.forEach(i=>itemMap[i.cat||i.type]=i.planned);

  const rows=allCats.map(({cat,type})=>{
    const key=cat;
    const val=itemMap[key]||'';
    const ico=type==='income'?'💳':type==='savings'?'💰':(CAT_E[cat]||'🔹');
    const col=type==='income'?'var(--blue-d)':type==='savings'?'var(--teal)':CAT_C[cat]||'#94A3B8';
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)">
      <div style="width:32px;height:32px;border-radius:9px;background:${col}18;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${ico}</div>
      <div style="flex:1;font-size:13px;font-weight:600;color:var(--t1)">${cat}</div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" inputmode="decimal" placeholder="0" value="${val}"
          style="width:80px;text-align:right;background:var(--bg);border:1.5px solid var(--bdr);border-radius:8px;padding:6px 8px;font-size:13px;font-weight:700;color:var(--t1);font-family:inherit;outline:none"
          data-cat="${cat}" data-type="${type}"
          oninput="bprevUpdateItem(this)"
          onfocus="this.style.borderColor='var(--blue)'"
          onblur="this.style.borderColor='var(--bdr)'">
        <span style="font-size:11px;color:var(--t2)">€</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('bprev-body').innerHTML=`
  <div class="form-field">
    <div class="f-lbl">Période</div>
    <div class="seg">
      <button class="seg-o${bprevPeriod==='monthly'?' on-sel':''}" onclick="setBPrevPeriod('monthly')">Mensuel</button>
      <button class="seg-o${bprevPeriod==='annual'?' on-sel':''}" onclick="setBPrevPeriod('annual')">Annuel</button>
    </div>
    ${bprevPeriod==='annual'?`<div style="font-size:11px;color:var(--t2);margin-top:6px">Les montants annuels seront divisés par 12 pour la comparaison mensuelle.</div>`:''}
  </div>
  <div style="margin-bottom:16px">
    <div class="f-lbl" style="margin-bottom:10px">Enveloppes ${bprevPeriod==='monthly'?'mensuelles':'annuelles'} (laisser vide pour ignorer)</div>
    ${rows}
  </div>
  <button class="btn-go" onclick="submitBPrev()">Enregistrer le budget</button>
  ${existing?`<button onclick="deleteBPrev('${existing.id}')" style="width:100%;margin-top:10px;padding:12px;border-radius:var(--r-sm);border:1.5px solid var(--bdr);background:transparent;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;font-family:inherit">Supprimer ce budget</button>`:''}`;
}

function setBPrevPeriod(p){bprevPeriod=p;renderBPrevForm();}

function bprevUpdateItem(el){
  const cat=el.dataset.cat;
  const type=el.dataset.type;
  const val=parseFloat(el.value)||0;
  const idx=bprevItems.findIndex(i=>i.cat===cat);
  if(val>0){
    if(idx>=0)bprevItems[idx].planned=val;
    else bprevItems.push({cat,type,planned:val});
  } else {
    if(idx>=0)bprevItems.splice(idx,1);
  }
}

function submitBPrev(){
  const now=new Date();
  const items=bprevItems.filter(i=>i.planned>0);
  if(items.length===0)return toast('Ajoutez au moins une enveloppe');
  const existing=bprevEditId?BUDGETS.find(b=>b.id===bprevEditId):getActiveBudget();
  if(existing){
    existing.period=bprevPeriod;existing.items=items;existing.year=now.getFullYear();
    if(bprevPeriod==='monthly')existing.month=now.getMonth();
  } else {
    const nb={id:gid(),period:bprevPeriod,year:now.getFullYear(),items};
    if(bprevPeriod==='monthly')nb.month=now.getMonth();
    BUDGETS.push(nb);
  }
  save();closeBPrev();render();toast('Budget enregistré ✓');
}

function deleteBPrev(id){
  BUDGETS=BUDGETS.filter(b=>b.id!==id);
  save();closeBPrev();render();toast('Budget supprimé');
}

// ═══ POCHES ═══════════════════════════════════════════════════════════════════
function renderPoches(){
  const totalInv=POCHES.reduce((s,p)=>s+p.currentValue,0);
  // Versé total = versements perso + abondements (les deux sont de vrais apports)
  const totalBase=POCHES.reduce((s,p)=>{
    const abond=(p.entries||[]).filter(e=>e.type==='abondement').reduce((a,e)=>a+e.amount,0);
    return s+p.invested+abond;
  },0);
  const totalPV=totalInv-totalBase;
  const perfGlob=totalBase>0?((totalPV/totalBase)*100):0;

  // Dividendes : réels 12 derniers mois + projetés depuis taux
  const now=new Date();
  const an12ago=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  const divReels=POCHES.reduce((s,p)=>{
    return s+(p.entries||[]).filter(e=>e.type==='dividende'&&new Date(e.date)>=an12ago).reduce((a,e)=>a+e.amount,0);
  },0);
  const divProjected=POCHES.reduce((s,p)=>s+(p.taux>0?p.currentValue*p.taux/100:0),0);
  const divTotal=Math.max(divReels,divProjected);

  return`
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-lbl">Total</div><div class="kpi-val">${EUR(totalInv)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Plus-value</div><div class="kpi-val" style="color:${totalPV>=0?'var(--blue-d)':'var(--red)'}">${totalPV>=0?'+':''}${EUR(totalPV)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Rend. annuel</div><div class="kpi-val" style="color:var(--teal)">${EUR(Math.round(divTotal))}</div></div>
    <div class="kpi"><div class="kpi-lbl">Performance</div><div class="kpi-val">${PCT(perfGlob)}</div></div>
  </div>
  ${POCHES.map(p=>pocketCard(p)).join('')}`;
}

function pocketCol(type){return AST_C[type]||'#94A3B8';}
function pocketEm(type){return AST_E[type]||'🔹';}
const POCKET_TYPES=['PEA','Actions','ETF','SCPI','Crypto','Assurance-Vie','Livret','Épargne salariale','Autre'];

function pocketCard(p){
  // Pour l'épargne salariale : la plus-value = ce que le marché a généré,
  // donc on exclut l'abondement du calcul (il n'est pas un gain, c'est un apport employeur)
  const abondTotal=(p.entries||[]).filter(e=>e.type==='abondement').reduce((s,e)=>s+e.amount,0);
  const pv=p.currentValue-p.invested-abondTotal; // vraie plus-value marché
  const perfBase=p.invested+abondTotal; // base totale pour le % de perf globale
  const perf=perfBase>0?((pv/perfBase)*100):0;
  const isOpen=pocketOpen[p.id];
  const col=pocketCol(p.type);
  const em=p.icon||pocketEm(p.type);
  const entries=[...p.entries].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalDiv=entries.filter(e=>e.type==='dividende').reduce((s,e)=>s+e.amount,0);
  // Dividendes 12 derniers mois réels
  const an12ago=new Date(); an12ago.setFullYear(an12ago.getFullYear()-1);
  const divAn=entries.filter(e=>e.type==='dividende'&&new Date(e.date)>=an12ago).reduce((s,e)=>s+e.amount,0);
  // Dividendes projetés (si taux renseigné)
  const divProj=p.taux>0?Math.round(p.currentValue*p.taux/100):0;
  const rendLabel=divProj>0?`${EUR(divProj)}/an (projeté)`:divAn>0?`${EUR(Math.round(divAn))}/an (réel)`:'—';
  const rendCol=divProj>0?'var(--teal)':divAn>0?'var(--teal)':'var(--t3)';
  const positions=p.positions||[];
  const hasPositions=['Actions','ETF','Crypto'].includes(p.type);

  return`<div class="pocket">
    <div class="pocket-header" onclick="togglePocket('${p.id}')">
      <div class="pocket-ico" style="background:${col}15">${em}</div>
      <div class="pocket-info">
        <div class="pocket-name">${p.name}</div>
        <div class="pocket-sub">${p.type}${p.broker?' · '+p.broker:''}${p.taux?` · ${p.taux}%/an`:''}${p.parts?' · '+p.parts+' parts':''}</div>
      </div>
      <div class="pocket-right">
        <div class="pocket-val">${EUR(p.currentValue)}</div>
        <div class="pocket-perf" style="color:${perf>=0?'var(--blue-d)':'var(--red)'}">${PCT(perf)} (${EUR(pv)})</div>
      </div>
    </div>
    ${isOpen?`
    <div class="pocket-body">
      <div style="display:flex;justify-content:flex-end;gap:10px;padding:8px 14px 0">
        <button onclick="openUpd('${p.id}','pocket');event.stopPropagation()" style="font-size:11px;font-weight:700;color:var(--teal);border:none;background:none;cursor:pointer;font-family:inherit">📊 Valorisation</button>
        <button onclick="openEdit('${p.id}','pocket');event.stopPropagation()" style="font-size:11px;font-weight:700;color:var(--blue);border:none;background:none;cursor:pointer;font-family:inherit">✏️ Modifier</button>
        <button onclick="openPocketAdd('${p.id}');event.stopPropagation()" style="font-size:11px;font-weight:700;color:var(--violet);border:none;background:none;cursor:pointer;font-family:inherit">+ Mouvement</button>
      </div>

      ${p.history&&p.history.length>=2?assetSparkline({...p,value:p.currentValue,type:p.type,id:p.id}):''}

      <div class="p-stat-grid">
        <div class="p-stat"><div class="p-stat-lbl">Versé</div><div class="p-stat-val">${EUR(p.invested)}</div></div>
        <div class="p-stat"><div class="p-stat-lbl">Valeur</div><div class="p-stat-val">${EUR(p.currentValue)}</div></div>
        <div class="p-stat"><div class="p-stat-lbl">Plus-value</div><div class="p-stat-val" style="color:${pv>=0?'var(--blue-d)':'var(--red)'}">${pv>=0?'+':''}${EUR(pv)}</div></div>
        <div class="p-stat"><div class="p-stat-lbl">Rendement annuel</div><div class="p-stat-val" style="color:${rendCol}">${rendLabel}</div></div>
        ${(()=>{
          // Stats spécifiques par type
          if(p.type==='SCPI'){
            const loyersTotal=entries.filter(e=>['loyers','dividende'].includes(e.type)).reduce((s,e)=>s+e.amount,0);
            return`<div class="p-stat"><div class="p-stat-lbl">Nb parts</div><div class="p-stat-val">${p.parts||0}</div></div>
            <div class="p-stat"><div class="p-stat-lbl">Prix / part</div><div class="p-stat-val">${EUR2(p.prixPart||0)}</div></div>
            <div class="p-stat" style="grid-column:1/-1"><div class="p-stat-lbl">Loyers totaux perçus</div><div class="p-stat-val" style="color:var(--teal)">${EUR(loyersTotal)}</div></div>`;
          }
          if(p.type==='Livret'||p.type==='Assurance-Vie'){
            const interetsTotal=entries.filter(e=>['intérêts','dividende'].includes(e.type)).reduce((s,e)=>s+e.amount,0);
            return`${p.taux?`<div class="p-stat"><div class="p-stat-lbl">Taux</div><div class="p-stat-val">${p.taux}%/an</div></div>`:''}
            <div class="p-stat"><div class="p-stat-lbl">Intérêts totaux</div><div class="p-stat-val" style="color:var(--teal)">${EUR(interetsTotal)}</div></div>`;
          }
          if(p.type==='Épargne salariale'){
            return`<div class="p-stat"><div class="p-stat-lbl">Versé perso.</div><div class="p-stat-val">${EUR(p.invested)}</div></div>
            <div class="p-stat"><div class="p-stat-lbl">Abondement</div><div class="p-stat-val" style="color:var(--violet)">+${EUR(abondTotal)}</div></div>
            <div class="p-stat" style="grid-column:1/-1"><div class="p-stat-lbl">Plus-value marché</div><div class="p-stat-val" style="color:${pv>=0?'var(--blue-d)':'var(--red)'}">${pv>=0?'+':''}${EUR(Math.round(pv))}</div></div>`;
          }
          if(['PEA','Actions','ETF','Investissements'].includes(p.type)){
            return`<div class="p-stat"><div class="p-stat-lbl">Dividendes totaux</div><div class="p-stat-val" style="color:var(--teal)">${EUR(totalDiv)}</div></div>`;
          }
          if(p.type==='Crypto'){
            const stakingTotal=entries.filter(e=>e.type==='staking').reduce((s,e)=>s+e.amount,0);
            return`<div class="p-stat"><div class="p-stat-lbl">Staking reçu</div><div class="p-stat-val" style="color:var(--teal)">${EUR(stakingTotal)}</div></div>`;
          }
          return'';
        })()}
      </div>

      ${(()=>{
        // ── Sous-actifs depuis les entrées ──
        // Construire les lignes depuis les versements avec asset/parts
        const lignes={};
        entries.filter(e=>['versement','achat','abondement'].includes(e.type)&&(e.asset||e.parts)).forEach(e=>{
          const key=e.asset||p.name;
          if(!lignes[key])lignes[key]={name:key,parts:0,lastPrix:0,invested:0,abond:0};
          if(e.parts)lignes[key].parts+=e.parts;
          if(e.prixPart||e.prixU)lignes[key].lastPrix=e.prixPart||e.prixU;
          if(e.type==='abondement')lignes[key].abond+=e.amount;
          else lignes[key].invested+=e.amount;
        });
        const lignesList=Object.values(lignes);
        if(lignesList.length===0&&!hasPositions)return'';
        if(lignesList.length>0){
          return`<div style="padding:8px 16px 0">
            <div style="font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Lignes</div>
            ${lignesList.map(l=>{
              const val=l.parts>0&&l.lastPrix>0?l.parts*l.lastPrix:l.invested+l.abond;
              return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)">
                <div style="width:38px;height:38px;border-radius:10px;background:${col}15;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${col};flex-shrink:0">${l.name.slice(0,3).toUpperCase()}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:700;color:var(--t1)">${l.name}</div>
                  <div style="font-size:11px;color:var(--t2)">${l.parts>0?`${l.parts} parts${l.lastPrix>0?' · '+EUR2(l.lastPrix)+'/part':''}`:EUR(l.invested)+' investi'}${l.abond>0?` · +${EUR(l.abond)} abond.`:''}</div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                  <div style="font-size:13px;font-weight:700;color:var(--t1)">${EUR(val)}</div>
                </div>
              </div>`;
            }).join('')}
          </div>`;
        }
        // Positions classiques (PEA/Actions/ETF)
        if(hasPositions&&positions.length>0){
          return`<div style="padding:8px 16px 0">
            <div style="font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Positions · <button onclick="openPositionAdd('${p.id}');event.stopPropagation()" style="font-size:9px;font-weight:700;color:var(--blue);border:none;background:none;cursor:pointer;font-family:inherit">+ Ajouter</button></div>
            ${positions.map(pos=>{
              const posVal=pos.qty*(pos.prixActuel||pos.pru);
              const posPv=pos.qty*(pos.prixActuel||pos.pru)-pos.qty*pos.pru;
              const posPct=pos.pru>0?(posPv/(pos.qty*pos.pru)*100):0;
              const posCol=posPv>=0?'var(--blue-d)':'var(--red)';
              return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);position:relative;">
                <div style="width:38px;height:38px;border-radius:10px;background:${col}15;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${col};flex-shrink:0">${(pos.ticker||pos.name||'?').slice(0,4).toUpperCase()}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:12px;font-weight:700;color:var(--t1)">${pos.name||pos.ticker}</div>
                  <div style="font-size:11px;color:var(--t2)">${pos.qty} × ${EUR2(pos.prixActuel||pos.pru)} · PRU ${EUR2(pos.pru)}</div>
                </div>
                <div style="text-align:right;flex-shrink:0;padding-right:20px">
                  <div style="font-size:13px;font-weight:700;color:var(--t1)">${EUR(posVal)}</div>
                  <div style="font-size:10px;font-weight:700;color:${posCol}">${posPv>=0?'+':''}${EUR(posPv)} (${posPct>=0?'+':''}${posPct.toFixed(1)}%)</div>
                </div>
                <button onclick="deletePosition('${p.id}','${pos.id}');event.stopPropagation()" style="position:absolute;top:8px;right:0;font-size:16px;background:none;border:none;cursor:pointer;color:var(--t3)">×</button>
              </div>`;
            }).join('')}
          </div>`;
        }
        return'';
      })()}

      <div class="p-entries">
        <div style="font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;padding:10px 16px 6px">
          Historique
          ${(()=>{
            // Grouper par type pour les statistiques
            const byType={};
            entries.forEach(e=>{if(!byType[e.type])byType[e.type]=0;byType[e.type]+=e.amount;});
            const chips=Object.entries(byType).map(([t,v])=>`<span style="font-size:9px;font-weight:700;color:var(--t2);background:var(--bg);border-radius:20px;padding:2px 8px">${t} ${EUR(Math.round(v))}</span>`).join('');
            return chips?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${chips}</div>`:'';
          })()}
        </div>
        ${entries.slice(0,8).map(e=>{
          const typeColors={
            versement:col,retrait:'var(--red)',dividende:'var(--teal)',
            loyers:'var(--teal)',intérêts:'var(--teal)',abondement:'var(--violet)',
            achat:col,vente:'var(--red)',staking:'var(--amber)','plus-value':'var(--blue-d)'
          };
          const ec=typeColors[e.type]||'var(--t2)';
          const sign=['retrait','vente'].includes(e.type)?'−':'+';
          const dt=new Date(e.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'2-digit'});
          const detail=e.parts?` · ${e.parts} parts`:e.qty?` · ${e.qty} titres`:e.abondRate?` · abond. ${e.abondRate}%`:'';
          return`<div class="p-entry">
            <div class="p-entry-dot" style="background:${ec}"></div>
            <div style="flex:1;min-width:0">
              <div class="p-entry-lbl">${e.label}${e.asset?` — ${e.asset}`:''}</div>
              <div class="p-entry-dt">${e.type}${detail} · ${dt}</div>
            </div>
            <div class="p-entry-val" style="color:${ec}">${sign}${EUR(e.amount)}</div>
          </div>`;
        }).join('')}
        ${entries.length>8?`<div style="padding:8px 16px;font-size:11px;color:var(--t2);text-align:center">${entries.length-8} autres mouvements</div>`:''}
      </div>
      <button class="pocket-add-btn" onclick="openPocketAdd('${p.id}')">+ Ajouter un mouvement</button>
    </div>`:''}
  </div>`;
}

function togglePocket(id){pocketOpen[id]=!pocketOpen[id];render();}
function openPat(id){pocketOpen[id]=true;swiped={};render();}
function closePat(id){pocketOpen[id]=false;render();}
function deletePosition(pocketId,posId){
  const p=POCHES.find(x=>x.id===pocketId);if(!p)return;
  p.positions=(p.positions||[]).filter(x=>x.id!==posId);
  // recalc currentValue from positions if all positions tracked
  if((p.positions||[]).length>0)p.currentValue=p.positions.reduce((s,pos)=>s+pos.qty*(pos.prixActuel||pos.pru),0);
  save();render();toast('Position supprimée');
}

// ═══ PATRIMOINE ═══════════════════════════════════════════════════════════════
function renderPat(){
  const pochesVal=POCHES.reduce((s,p)=>s+p.currentValue,0);
  const totA=ASSETS.reduce((s,a)=>s+a.value,0)+pochesVal;
  const totL=LIABS.reduce((s,l)=>s+l.amount,0);
  const nw=totA-totL;
  const disp=heroMode==='net'?nw:totA;
  const epargne=ASSETS.filter(a=>a.type==='Épargne').reduce((s,a)=>s+a.value,0);

  const types={};
  ASSETS.forEach(a=>{if(!types[a.type])types[a.type]=0;types[a.type]+=a.value;});
  POCHES.forEach(p=>{if(!types[p.type])types[p.type]=0;types[p.type]+=p.currentValue;});
  const typeList=Object.entries(types).sort((a,b)=>b[1]-a[1]);

  return`
  <div class="hero">
    <div class="hero-z">
      <div class="hero-top">
        <div class="hero-lbl">${heroMode==='net'?'Patrimoine net':'Patrimoine brut'}</div>
        <div class="hero-toggle">
          <button class="htog${heroMode==='net'?' on':''}" onclick="setHeroMode('net')">Net</button>
          <button class="htog${heroMode==='brut'?' on':''}" onclick="setHeroMode('brut')">Brut</button>
        </div>
      </div>
      <div class="hero-val">${EUR(disp)}</div>
      <div class="hero-row">
        <div class="hero-stat"><label>Actifs</label><span style="color:#60A5FA">${EUR(totA)}</span></div>
        <div class="hero-divider"></div>
        <div class="hero-stat"><label>Passifs</label><span style="color:#F87171">${EUR(totL)}</span></div>
        <div class="hero-divider"></div>
        <div class="hero-stat"><label>Liquidités</label><span>${EUR(epargne)}</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head" style="padding-bottom:6px"><div><div class="card-title">Répartition</div><div class="card-sub">Tous les actifs</div></div></div>
    <div class="donut-canvas-wrap" style="width:160px;height:160px;margin:14px auto 6px"><canvas class="donut-canvas" id="main-chart"></canvas></div>
    <div class="bar-rows" id="donut-leg" style="padding-top:4px">
      ${typeList.map(([type,val])=>{const col=AST_C[type]||'#94A3B8';const pct=totA>0?Math.round(val/totA*100):0;return`<div>
        <div class="bar-head"><div class="bar-nm"><div class="bar-dot" style="background:${col}"></div>${type}</div><div class="bar-amts">${EUR(val)} <span style="color:var(--t2);font-weight:700">${pct}%</span></div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;}).join('')}
    </div>
  </div>

  ${(()=>{
    // ── Graphique évolution patrimoine ──
    const allHistory=[];
    [...ASSETS,...POCHES].forEach(item=>{
      (item.history||[]).forEach(h=>allHistory.push({date:h.date,value:h.value,id:item.id}));
    });
    if(allHistory.length<2)return'';
    // Build merged timeline: for each unique date, sum all latest-known values
    const allDates=[...new Set(allHistory.map(h=>h.date))].sort();
    const allItems=[...ASSETS,...POCHES];
    const timeline=allDates.map(date=>{
      const sum=allItems.reduce((s,item)=>{
        const hist=[...(item.history||[])].sort((a,b)=>a.date.localeCompare(b.date));
        const pt=hist.filter(h=>h.date<=date).pop();
        return s+(pt?pt.value:(item.value||item.currentValue||0));
      },0);
      return{date,value:Math.round(sum)};
    });
    if(timeline.length<2)return'';
    const W=340,H=70,pad=6;
    const vals=timeline.map(t=>t.value);
    const minV=Math.min(...vals),maxV=Math.max(...vals),rangeV=maxV-minV||1;
    const pts=timeline.map((t,i)=>[
      Math.round(i/(timeline.length-1)*W),
      Math.round((1-(t.value-minV)/rangeV)*(H-pad*2)+pad)
    ]);
    const trend=vals[vals.length-1]>=vals[0];
    const c=trend?'#2563EB':'var(--red)';
    const pStr=pts.map(p=>p.join(',')).join(' ');
    const fill=`0,${H} ${pStr} ${W},${H}`;
    const first=timeline[0],last=timeline[timeline.length-1];
    const change=last.value-first.value;
    const changePct=first.value>0?(change/first.value*100):0;
    return`<div class="card">
      <div class="card-head" style="padding-bottom:4px">
        <div><div class="card-title">Évolution du patrimoine</div><div class="card-sub">${timeline.length} points · ${new Date(first.date+'T00:00:00').toLocaleDateString('fr-FR',{month:'short',year:'numeric'})} → aujourd'hui</div></div>
        <div style="text-align:right"><div style="font-size:13px;font-weight:800;color:${c}">${change>=0?'+':''}${EUR(change)}</div><div style="font-size:10px;color:var(--t2)">${changePct>=0?'+':''}${changePct.toFixed(1)}%</div></div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;margin:4px 0 2px">
        <defs><linearGradient id="patg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${c}" stop-opacity=".15"/>
          <stop offset="100%" stop-color="${c}" stop-opacity=".02"/>
        </linearGradient></defs>
        <polygon points="${fill}" fill="url(#patg)"/>
        <polyline points="${pStr}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="4" fill="${c}" stroke="#fff" stroke-width="2"/>
      </svg>
      <div style="display:flex;justify-content:space-between;padding:0 4px 10px">
        <div style="font-size:10px;color:var(--t3)">${EUR(first.value)} · ${new Date(first.date+'T00:00:00').toLocaleDateString('fr-FR',{month:'short',year:'2-digit'})}</div>
        <div style="font-size:10px;color:var(--t3)">${EUR(last.value)} · aujourd'hui</div>
      </div>
    </div>`;
  })()}

  <div class="sec-title">Actifs · ${EUR(totA)}</div>
  <div class="card" style="margin-bottom:10px">
    ${(()=>{
      if(ASSETS.length===0&&POCHES.length===0) return'<div class="empty">Aucun actif — appuie sur + pour en ajouter</div>';

      let html='';

      // ── Actifs groupés par type ──
      const byType={};
      ASSETS.forEach(a=>{if(!byType[a.type])byType[a.type]=[];byType[a.type].push(a);});
      const typeGroups=Object.entries(byType).sort((a,b)=>b[1].reduce((s,x)=>s+x.value,0)-a[1].reduce((s,x)=>s+x.value,0));

      typeGroups.forEach(([type,items])=>{
        const col=AST_C[type]||'#94A3B8';
        const em=AST_E[type]||'🔹';
        const subtot=items.reduce((s,a)=>s+a.value,0);
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 16px 8px;background:var(--bg);border-bottom:1px solid var(--bdr)">
          <div style="width:20px;height:20px;border-radius:6px;background:${col}22;display:flex;align-items:center;justify-content:center;font-size:11px">${em}</div>
          <span style="flex:1;font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.06em">${type}</span>
          <span style="font-size:12px;font-weight:700;color:var(--t2)">${EUR(subtot)}</span>
        </div>`;
        items.forEach(a=>{
          const pct=totA>0?Math.round(a.value/totA*100):0;
          const ico=a.icon||AST_E[a.type]||'🔹';
          html+=`<div class="asset-item" onclick="openAssetSheet('${a.id}','asset')">
            <div class="asset-ico" style="background:${col}15">${ico}</div>
            <div class="asset-body">
              <div class="asset-nm">${a.name}</div>
              <div class="asset-tp">${a.taux?`${a.taux}%/an · `:''}</div>
            </div>
            <div class="asset-right">
              <div class="asset-val">${EUR(a.value)}</div>
              <div class="asset-pct" style="background:${col}15;color:${col}">${pct}%</div>
            </div>
          </div>`;
        });
      });

      // ── Placements ──
      if(POCHES.length>0){
        const pochesTotal=POCHES.reduce((s,p)=>s+p.currentValue,0);
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 16px 8px;background:var(--bg);border-bottom:1px solid var(--bdr);${ASSETS.length>0?'border-top:2px solid var(--bdr);':''}">
          <div style="width:20px;height:20px;border-radius:6px;background:#6366F122;display:flex;align-items:center;justify-content:center;font-size:11px">🔒</div>
          <span style="flex:1;font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.06em">Placements</span>
          <span style="font-size:12px;font-weight:700;color:var(--t2)">${EUR(pochesTotal)}</span>
        </div>`;
        POCHES.forEach(p=>{
          const col=pocketCol(p.type);
          const pv=p.currentValue-p.invested;
          const perf=p.invested>0?pv/p.invested*100:0;
          html+=`<div class="asset-item" onclick="openAssetSheet('${p.id}','pocket')">
            <div class="asset-ico" style="background:${col}15">${p.icon||pocketEm(p.type)}</div>
            <div class="asset-body">
              <div class="asset-nm">${p.name}</div>
              <div class="asset-tp">${p.type}</div>
            </div>
            <div class="asset-right">
              <div class="asset-val">${EUR(p.currentValue)}</div>
              <div class="asset-pct" style="background:${perf>=0?col+'18':'var(--red-l)'};color:${perf>=0?col:'var(--red)'}">${perf>=0?'+':''}${perf.toFixed(1)}%</div>
            </div>
          </div>`;
        });
      }

      return html;
    })()}
  </div>

  <div class="sec-title">Passifs · ${EUR(totL)}</div>
  <div class="card">
    ${LIABS.length===0?'<div class="empty">Aucun passif</div>':
      (()=>{
        const byType={};
        LIABS.forEach(l=>{if(!byType[l.type])byType[l.type]=[];byType[l.type].push(l);});
        return Object.entries(byType).map(([type,items])=>{
          const subtot=items.reduce((s,l)=>s+l.amount,0);
          return`<div style="display:flex;align-items:center;gap:8px;padding:9px 16px 8px;background:var(--bg);border-bottom:1px solid var(--bdr)">
            <div style="width:20px;height:20px;border-radius:6px;background:#E8394A22;display:flex;align-items:center;justify-content:center;font-size:11px">📉</div>
            <span style="flex:1;font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.06em">${type}</span>
            <span style="font-size:12px;font-weight:700;color:var(--t2)">${EUR(subtot)}</span>
          </div>
          ${items.map(l=>`<div class="asset-item" onclick="openAssetSheet('${l.id}','liab')">
            <div class="asset-ico" style="background:#E8394A15">📉</div>
            <div class="asset-body"><div class="asset-nm">${l.name}</div></div>
            <div class="asset-right">
              <div class="asset-val" style="color:var(--red)">−${EUR(l.amount)}</div>
              <div class="asset-pct" style="background:var(--red-l);color:var(--red)">${totL>0?Math.round(l.amount/totL*100):0}%</div>
            </div>
          </div>`).join('')}`;
        }).join('');
      })()
    }
  </div>`;
}

// ═══ ASSET ACTION SHEET ═══════════════════════════════════════════════════════
function openAssetSheet(id, kind){
  const item = kind==='asset' ? ASSETS.find(a=>a.id===id)
              : kind==='pocket' ? POCHES.find(p=>p.id===id)
              : LIABS.find(l=>l.id===id);
  if(!item) return;

  const val   = kind==='liab' ? item.amount : (item.value||item.currentValue||0);
  const col   = kind==='liab' ? '#E8394A'
              : kind==='pocket' ? pocketCol(item.type)
              : AST_C[item.type]||'#94A3B8';
  const ico   = kind==='liab' ? '📉'
              : item.icon||(kind==='pocket'?pocketEm(item.type):AST_E[item.type]||'🔹');
  const sub   = kind==='liab'  ? item.type
              : kind==='pocket' ? `${item.type}${item.taux?` · ${item.taux}%/an`:''}${item.broker?' · '+item.broker:''}`
              : `${item.type}${item.taux?` · ${item.taux}%/an`:''}`;

  document.getElementById('asheet-title').textContent = item.name;
  document.getElementById('asheet-sub').textContent   = sub;

  const hist = (kind!=='liab') ? (item.history||[]) : [];
  const sparkHtml = hist.length>=2 ? assetSparkline({...item, value:val, id:item.id}) : '';

  // For pocket: show perf stats
  let statsHtml='';
  if(kind==='pocket'){
    const abondSheet=(item.entries||[]).filter(e=>e.type==='abondement').reduce((s,e)=>s+e.amount,0);
    const baseSheet=item.invested+abondSheet;
    const pv=item.currentValue-baseSheet;
    const perf=baseSheet>0?(pv/baseSheet*100):0;
    statsHtml=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);margin-bottom:1px">
      <div style="background:var(--s);padding:11px 16px"><div style="font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">Versé</div><div style="font-size:16px;font-weight:800">${EUR(item.invested)}</div></div>
      <div style="background:var(--s);padding:11px 16px"><div style="font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">Plus-value</div><div style="font-size:16px;font-weight:800;color:${pv>=0?col:'var(--red)'}">+${EUR(pv)}</div></div>
    </div>`;
  }

  // Value display
  const valColor = kind==='liab' ? 'var(--red)' : 'var(--t1)';
  const valPrefix = kind==='liab' ? '−' : '';

  // Action buttons
  const btns = kind==='liab' ? `
    <button onclick="closeAssetSheet();openEdit('${id}','liab')" class="asheet-btn">✏️ Modifier</button>
    <button onclick="closeAssetSheet();confirmDelete('${id}','liab')" class="asheet-btn asheet-btn-del">🗑 Supprimer</button>
  ` : kind==='pocket' ? `
    <button onclick="closeAssetSheet();openUpd('${id}','pocket')" class="asheet-btn asheet-btn-main">📊 Mettre à jour la valeur</button>
    <button onclick="closeAssetSheet();openEdit('${id}','pocket')" class="asheet-btn">✏️ Modifier</button>
    <button onclick="closeAssetSheet();goTo('poches')" class="asheet-btn">📂 Voir dans Placements</button>
    <button onclick="closeAssetSheet();confirmDelete('${id}','pocket')" class="asheet-btn asheet-btn-del">🗑 Supprimer</button>
  ` : `
    <button onclick="closeAssetSheet();openUpd('${id}','asset')" class="asheet-btn asheet-btn-main">📊 Mettre à jour la valeur</button>
    <button onclick="closeAssetSheet();openEdit('${id}','asset')" class="asheet-btn">✏️ Modifier</button>
    <button onclick="closeAssetSheet();confirmDelete('${id}','asset')" class="asheet-btn asheet-btn-del">🗑 Supprimer</button>
  `;

  document.getElementById('asheet-body').innerHTML=`
    <div style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:48px;height:48px;border-radius:14px;background:${col}18;display:flex;align-items:center;justify-content:center;font-size:22px">${ico}</div>
        <div>

function mergedHistory(items){
  // items = [{value, history:[{date,value}]}]
  // Build a timeline of summed values using last-known-value interpolation
  const allDates=new Set();
  items.forEach(it=>(it.history||[]).forEach(h=>allDates.add(h.date)));
  if(allDates.size===0){
    // No history — just use current value with a fake 2-point line
    const today=new Date().toISOString().split('T')[0];
    const total=items.reduce((s,it)=>s+(it.value||it.currentValue||0),0);
    return [{date:today,value:total},{date:today,value:total}];
  }
  const sorted=[...allDates].sort();
  return sorted.map(date=>{
    let sum=0;
    items.forEach(it=>{
      const hist=[...(it.history||[])].sort((a,b)=>a.date.localeCompare(b.date));
      // Last entry on or before this date
      const prev=hist.filter(h=>h.date<=date).pop();
      if(prev) sum+=prev.value;
      else sum+=(it.value||it.currentValue||0); // fallback to current
    });
    return{date,value:Math.round(sum)};
  });
}

function buildCategoryCharts(){
  const cards=PAT_CATS.map(cat=>{
    const assets=ASSETS.filter(a=>cat.assetTypes.has(a.type));
    const poches=POCHES.filter(p=>cat.pocheTypes.has(p.type));
    const allItems=[
      ...assets.map(a=>({value:a.value,history:a.history})),
      ...poches.map(p=>({value:p.currentValue,history:p.history})),
    ];
    const total=assets.reduce((s,a)=>s+a.value,0)+poches.reduce((s,p)=>s+p.currentValue,0);
    if(total===0&&allItems.length===0)return null;

    const hist=mergedHistory(allItems);
    const firstV=hist[0]?.value||0,lastV=hist[hist.length-1]?.value||total;
    const change=lastV-firstV;
    const changePct=firstV>0?(change/firstV*100):0;
    const trend=change>=0;
    const c=trend?cat.color:'#E8394A';

    // Mini sparkline SVG
    const W=140,H=40,pad=5;
    let sparkSvg='';
    if(hist.length>=2){
      const vals=hist.map(h=>h.value);
      const minV=Math.min(...vals),maxV=Math.max(...vals),rangeV=maxV-minV||1;
      const ps=hist.map((h,i)=>[
        Math.round(i/(hist.length-1)*W),
        Math.round((1-(h.value-minV)/rangeV)*(H-pad*2)+pad)
      ]);
      const pStr=ps.map(p=>p.join(',')).join(' ');
      const fillPts=`0,${H} ${pStr} ${W},${H}`;
      const uid='cc'+cat.key;
      sparkSvg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="display:block">
        <defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${c}" stop-opacity=".2"/>
          <stop offset="100%" stop-color="${c}" stop-opacity=".01"/>
        </linearGradient></defs>
        <polygon points="${fillPts}" fill="url(#${uid})"/>
        <polyline points="${pStr}" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${ps[ps.length-1][0]}" cy="${ps[ps.length-1][1]}" r="3.5" fill="${c}" stroke="#fff" stroke-width="1.5"/>
      </svg>`;
    }

    return`<div style="background:var(--s);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:12px 14px 10px;overflow:hidden;position:relative">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">${cat.icon} ${cat.label}</div>
          <div style="font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.03em;line-height:1">${EUR(total)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;font-weight:700;color:${c}">${trend?'+':''}${changePct.toFixed(1)}%</div>
          <div style="font-size:10px;color:var(--t2);margin-top:2px">${trend?'+':''}${EUR(change)}</div>
        </div>
      </div>
      ${sparkSvg?`<div style="margin:0 -14px -10px">${sparkSvg}</div>`:'<div style="height:12px"></div>'}
    </div>`;
  }).filter(Boolean);

  if(cards.length===0)return'';
  return`<div style="margin-bottom:14px">
    <div class="sec-title">Évolution par catégorie</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${cards.join('')}</div>
  </div>`;
}

function buildLine(){
  const ctx=document.getElementById('main-chart');if(!ctx)return;

  let y=FROM.year,m=FROM.month;
  while(y<TO.year||(y===TO.year&&m<=TO.month)){
    const s=new Date(y,m,1),e=new Date(y,m+1,0,23,59,59,999);
    labels.push(MONTHS_S[m]);
    const mo=TXS.filter(t=>{const d=new Date(t.date);return d>=s&&d<=e;});

    expD.push(Math.round(mo.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0)));
    savD.push(Math.round(mo.filter(t=>t.type==='savings').reduce((a,t)=>a+t.amount,0)));
    m++;if(m>11){m=0;y++;}
  }
  if(labels.length<2){labels.push('');incD.push(0);expD.push(0);savD.push(0);}
  const mk=(c,a,b)=>{const g=c.createLinearGradient(0,0,0,200);g.addColorStop(0,a);g.addColorStop(1,b);return g;};
  activeChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {label:'Revenus',data:incD,borderColor:'#1D4ED8',borderWidth:2,backgroundColor:c=>mk(c.chart.ctx,'rgba(29,78,216,.12)','rgba(29,78,216,.01)'),tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#1D4ED8',pointBorderColor:'#fff',pointBorderWidth:2,pointHoverRadius:6},

      {label:'Épargne',data:savD,borderColor:'#0D9488',borderWidth:2,backgroundColor:c=>mk(c.chart.ctx,'rgba(13,148,136,.10)','rgba(13,148,136,.01)'),tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#0D9488',pointBorderColor:'#fff',pointBorderWidth:2,pointHoverRadius:6},
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#0F1729',titleColor:'rgba(255,255,255,.5)',bodyColor:'#fff',padding:12,cornerRadius:10,callbacks:{label:c=>` ${c.dataset.label} : ${EUR(c.raw)}`}}},scales:{x:{grid:{display:false},border:{display:false},ticks:{color:'#CBD5E1',font:{size:10,family:'Plus Jakarta Sans',weight:'600'}}},y:{grid:{color:'rgba(0,0,0,.04)'},border:{display:false},ticks:{color:'#CBD5E1',font:{size:10,family:'Plus Jakarta Sans',weight:'600'},callback:v=>EUR(v)}}}}
  });
}

function buildDonut(){
  const ctx=document.getElementById('main-chart');
  if(!ctx)return;
  const types={};
  ASSETS.forEach(a=>{if(!types[a.type])types[a.type]=0;types[a.type]+=a.value;});
  POCHES.forEach(p=>{if(!types[p.type])types[p.type]=0;types[p.type]+=p.currentValue;});
  const totA=Object.values(types).reduce((s,v)=>s+v,0);
  const entries=Object.entries(types).sort((a,b)=>b[1]-a[1]);
  activeChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels:entries.map(e=>e[0]),datasets:[{data:entries.map(e=>Math.round(e[1])),backgroundColor:entries.map(e=>AST_C[e[0]]||'#94A3B8'),borderWidth:3,borderColor:'#fff',hoverOffset:5}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#0F1729',titleColor:'rgba(255,255,255,.5)',bodyColor:'#fff',padding:10,cornerRadius:8,callbacks:{label:c=>` ${EUR(c.raw)} (${Math.round(c.raw/totA*100)}%)`}}}}
  });
}

// ═══ GOALS ENGINE ═════════════════════════════════════════════════════════════
const GOAL_TYPES=[
  {key:'savings',label:'Épargne',icon:'💰',desc:'Atteindre un montant sur un actif'},
  {key:'patrimoine',label:'Patrimoine net',icon:'🏆',desc:'Atteindre un patrimoine net cible'},
  {key:'budget',label:'Budget max',icon:'🎯',desc:'Ne pas dépasser un budget mensuel'},
  {key:'debt',label:'Remboursement',icon:'📉',desc:'Solder une dette'},
  {key:'income',label:'Revenu cible',icon:'💳',desc:'Atteindre un revenu mensuel'},
];

function goalCurrent(g){
  const now=new Date();
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
  if(g.type==='savings'){
    if(g.linkedId){
      const a=ASSETS.find(x=>x.id===g.linkedId)||POCHES.find(x=>x.id===g.linkedId);
      return a?(a.value||a.currentValue||0):0;
    }
    return ASSETS.reduce((s,a)=>s+a.value,0)+POCHES.reduce((s,p)=>s+p.currentValue,0);
  }
  if(g.type==='patrimoine'){
    const totA=ASSETS.reduce((s,a)=>s+a.value,0)+POCHES.reduce((s,p)=>s+p.currentValue,0);
    const totL=LIABS.reduce((s,l)=>s+l.amount,0);
    return totA-totL;
  }
  if(g.type==='budget'){
    const cat=g.linkedId;
    return TXS.filter(t=>{
      const d=new Date(t.date);
      return d>=monthStart&&d<=monthEnd&&t.type==='expense'&&(!cat||t.cat===cat);
    }).reduce((s,t)=>s+t.amount,0);
  }
  if(g.type==='debt'){
    if(g.linkedId){const l=LIABS.find(x=>x.id===g.linkedId);return l?l.amount:0;}
    return LIABS.reduce((s,l)=>s+l.amount,0);
  }
  if(g.type==='income'){
    return TXS.filter(t=>{
      const d=new Date(t.date);
      return d>=monthStart&&d<=monthEnd&&t.type==='income';
    }).reduce((s,t)=>s+t.amount,0);
  }
  return 0;
}

function goalProgress(g){
  const cur=goalCurrent(g);
  if(g.type==='budget'||g.type==='debt'){
    // lower is better — progress = how much reduced from target
    if(g.type==='budget') return{cur,pct:Math.min(100,Math.round(cur/g.target*100)),inverted:true};
    const orig=g.originalAmount||g.target;
    const paid=orig-cur;
    return{cur,pct:Math.min(100,Math.round(paid/orig*100)),inverted:false};
  }
  return{cur,pct:Math.min(100,Math.round(cur/g.target*100)),inverted:false};
}

function goalStatusColor(g){
  const{pct,inverted}=goalProgress(g);
  if(inverted) return pct>=100?'var(--red)':pct>=80?'var(--amber)':'var(--teal)';
  if(g.deadline){
    const daysLeft=Math.ceil((new Date(g.deadline)-new Date())/(1000*60*60*24));
    const needed=100-pct;
    if(pct>=100)return'var(--teal)';
    if(daysLeft<30&&needed>20)return'var(--red)';
    if(daysLeft<90&&needed>40)return'var(--amber)';
  }
  return pct>=100?'var(--teal)':'var(--blue)';
}

function goalDeadlineLabel(g){
  if(!g.deadline)return'';
  const days=Math.ceil((new Date(g.deadline)-new Date())/(1000*60*60*24));
  if(days<0)return'⏰ Échue';
  if(days===0)return"⏰ Aujourd'hui";
  if(days<=7)return`⏰ ${days}j restants`;
  if(days<=60)return`📅 ${Math.ceil(days/7)} sem.`;
  return`📅 ${new Date(g.deadline).toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}`;
}

function buildGoalsCard(){
  if(GOALS.length===0)return`
  <div class="card">
    <div class="card-head" style="padding-bottom:10px">
      <div><div class="card-title">🎯 Objectifs</div><div class="card-sub">Aucun objectif défini</div></div>
      <button class="card-link" onclick="openGoal()">+ Ajouter</button>
    </div>
    <div class="empty">Fixez vos premiers objectifs financiers</div>
  </div>`;

  return`<div class="card">
    <div class="card-head" style="padding-bottom:4px">
      <div><div class="card-title">🎯 Objectifs</div><div class="card-sub">${GOALS.length} objectif${GOALS.length>1?'s':''} en cours</div></div>
      <button class="card-link" onclick="openGoal()">+ Ajouter</button>
    </div>
    ${GOALS.map(g=>{
      const{cur,pct,inverted}=goalProgress(g);
      const col=goalStatusColor(g);
      const deadlineLabel=goalDeadlineLabel(g);
      const done=inverted?pct>=100:pct>=100;
      const showAmt=g.type!=='budget'||true;
      const curLabel=g.type==='budget'?EUR(cur)+' dépensés':g.type==='debt'?EUR(cur)+' restants':EUR(cur);
      const tgtLabel=g.type==='budget'?'max '+EUR(g.target)+'/mois':g.type==='debt'?'objectif '+EUR(0):EUR(g.target);
      return`<div class="goal-item" onclick="openGoal('${g.id}')">
        <div class="goal-top">
          <div class="goal-ico" style="background:${col}18">${g.icon||'🎯'}</div>
          <div class="goal-info">
            <div class="goal-name">${g.title}</div>
            <div class="goal-meta">${GOAL_TYPES.find(t=>t.key===g.type)?.label||g.type}${deadlineLabel?' · '+deadlineLabel:''}</div>
          </div>
          <div class="goal-right">
            <div class="goal-pct" style="color:${col}">${done?'✓':pct+'%'}</div>
            ${deadlineLabel?`<div class="goal-deadline" style="color:${col}">${done?'Atteint!':''}</div>`:''}
          </div>
        </div>
        <div class="goal-bar-wrap">
          <div class="goal-bar" style="width:${pct}%;background:${col}"></div>
        </div>
        <div class="goal-vals">
          <div class="goal-cur">${curLabel}</div>
          <div class="goal-tgt">${tgtLabel}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

}

function submitGoal(){
  const title=(document.getElementById('g-title')?.value||'').trim();
  const target=parseFloat(document.getElementById('g-target')?.value||'');
  const linkedId=document.getElementById('g-linked')?.value||null;
  const deadline=(['savings','patrimoine','debt','income'].includes(goalType))?getDateValue('g-deadline'):null;
  const ico=(document.getElementById('goal-ico-preview')?.dataset.icon||document.getElementById('goal-ico-preview')?.textContent||'🎯').trim();
  if(!title)return toast('Ajoutez un nom');
  if(goalType!=='debt'&&(!target||target<=0))return toast('Montant invalide');

  if(editGoalId){
    const g=GOALS.find(x=>x.id===editGoalId);
    if(g){g.title=title;g.type=goalType;g.icon=ico;if(target)g.target=target;g.deadline=deadline||null;g.linkedId=linkedId||null;}
  } else {
    let tgt=target;
    if(goalType==='debt'&&linkedId){const l=LIABS.find(x=>x.id===linkedId);if(l){tgt=l.amount;}}
    GOALS.push({id:gid(),type:goalType,title,icon:ico,target:tgt,deadline:deadline||null,linkedId:linkedId||null,originalAmount:tgt});
  }
  save();closeGoal();render();toast(editGoalId?'Objectif modifié ✓':'Objectif créé ✓');
}

function deleteGoal(id){
  GOALS=GOALS.filter(g=>g.id!==id);
  save();closeGoal();render();toast('Objectif supprimé');
}

function submitPosition(){
  const ticker=(document.getElementById('pos-ticker')?.value||'').trim().toUpperCase();
  const name=(document.getElementById('pos-name')?.value||'').trim();
  const qty=parseFloat(document.getElementById('pos-qty')?.value||'');

  const prixActuel=parseFloat(document.getElementById('pos-prix')?.value||'');
  if(!ticker)return toast('Ajoutez un ticker');
  if(!qty||qty<=0)return toast('Quantité invalide');
  if(!pru||pru<=0)return toast('PRU invalide');
  const p=POCHES.find(x=>x.id===posAddPocketId);if(!p)return;
  if(!p.positions)p.positions=[];
  p.positions.push({id:gid(),ticker,name:name||ticker,qty,pru,prixActuel:prixActuel||pru});
  // recalculate currentValue from all positions
  p.currentValue=p.positions.reduce((s,pos)=>s+pos.qty*(pos.prixActuel||pos.pru),0);
  p.invested=p.positions.reduce((s,pos)=>s+pos.qty*pos.pru,0);
  save();closePosAdd();render();toast('Ligne ajoutée ✓');
}

function applyInterest(id,kind,amount){
  const item=kind==='asset'?ASSETS.find(a=>a.id===id):POCHES.find(p=>p.id===id);
  if(!item)return;
  const newVal=Math.round((item.value+amount)*100)/100;
  const date=new Date().toISOString().split('T')[0];
  if(!item.history)item.history=[];
  item.history.push({date,value:newVal,note:'Intérêts '+item.taux+'%'});
  item.value=newVal;
  if(kind==='pocket'){item.currentValue=newVal;}
  save();closeUpd();render();toast(`+${EUR2(amount)} intérêts enregistrés ✓`);
}

function submitUpd(){
  const val=parseFloat(document.getElementById('upd-val')?.value||'');
  const date=getDateValue('upd-date');
  const note=(document.getElementById('upd-note')?.value||'').trim();
  if(!val||val<0)return toast('Valeur invalide');
  const item=updKind==='asset'?ASSETS.find(a=>a.id===updId):POCHES.find(p=>p.id===updId);
  if(!item)return;
  if(!item.history)item.history=[];

  // Add the new history point
  item.history.push({date,value:val,note:note||undefined});

  // The current value = the most recent history point
  const sorted=[...item.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const mostRecent=sorted[0].value;
  item.value=mostRecent;
  if(updKind==='pocket')item.currentValue=mostRecent;

  save();
  // Re-render the form to show updated history
  renderUpdForm(item,updKind);
  render();
  toast('Valorisation enregistrée ✓');
}

function deleteHistoryPoint(id,kind,indexDesc){
  const item=kind==='asset'?ASSETS.find(a=>a.id===id):POCHES.find(p=>p.id===id);
  if(!item||!item.history)return;
  // indexDesc is 0-based index in desc-sorted array
  const sorted=[...item.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const toRemove=sorted[indexDesc];
  if(!toRemove)return;
  item.history=item.history.filter(h=>!(h.date===toRemove.date&&h.value===toRemove.value));
  // Recalc current value from remaining history
  if(item.history.length>0){
    const newest=[...item.history].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    item.value=newest.value;
    if(kind==='pocket')item.currentValue=newest.value;
  }
  save();renderUpdForm(item,kind);render();toast('Point supprimé');
}

// ═══ SPARKLINE SVG ═══════════════════════════════════════════════════════════

function assetSparkline(item){
  if(!item.history||item.history.length<2)return '';
  const sorted=[...item.history].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const vals=sorted.map(pt=>pt.value);
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const rangeV=maxV-minV||1;
  const W=300,H=52,pad=8;
  const ps=sorted.map((pt,i)=>[
    Math.round(i/(sorted.length-1)*W),
    Math.round((1-(pt.value-minV)/rangeV)*(H-pad*2)+pad)
  ]);
  const col=AST_C[item.type]||pocketCol(item.type)||'#2B6EF5';
  const firstVal=sorted[0].value,lastVal=sorted[sorted.length-1].value;
  const trend=lastVal>=firstVal;
  const c=trend?col:'#E8394A';
  const pStr=ps.map(p=>p.join(',')).join(' ');
  const fillPts=`0,${H} ${pStr} ${W},${H}`;
  const change=lastVal-firstVal;
  const changePct=firstVal>0?(change/firstVal*100):0;
  const uid='sg'+item.id.replace(/[^a-z0-9]/gi,'');
  return`<div class="spark-wrap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px">
      <div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em">Évolution</div>
      <div style="font-size:11px;font-weight:700;color:${c}">${trend?'+':''}${EUR(Math.round(change))} (${changePct>=0?'+':''}${changePct.toFixed(1)}%)</div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">
      <defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c}" stop-opacity=".15"/>
        <stop offset="100%" stop-color="${c}" stop-opacity=".01"/>
      </linearGradient></defs>
      <polygon points="${fillPts}" fill="url(#${uid})"/>
      <polyline points="${pStr}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${ps.map((p,i)=>i===ps.length-1?`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="${c}" stroke="#fff" stroke-width="2"/>`:'').join('')}
    </svg>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <div style="font-size:10px;color:var(--t3)">${new Date(sorted[0].date+'T00:00:00').toLocaleDateString('fr-FR',{month:'short',year:'2-digit'})}</div>
      <div style="font-size:10px;color:var(--t3)">${new Date(sorted[sorted.length-1].date+'T00:00:00').toLocaleDateString('fr-FR',{month:'short',year:'2-digit'})}</div>
    </div>
  </div>`;
}

function buildInsights(inc,exp,sav,bal,rate){
  const insights=[];
  if(rate>=20)insights.push({type:'good',ico:'🏆',title:'Excellent taux d\'épargne',txt:`${rate}% de vos revenus partent en épargne. Vous êtes dans le top des épargnants français (moyenne : 14%).`});
  else if(rate>=10)insights.push({type:'',ico:'💡',title:'Taux d\'épargne correct',txt:`${rate}% d'épargne. L'objectif "règle 50/30/20" recommande 20% — il vous manque ${20-rate}%.`});
  else if(rate>0)insights.push({type:'warn',ico:'⚠️',title:'Taux d\'épargne faible',txt:`Seulement ${rate}% de vos revenus sont épargnés. Essayez d'automatiser un virement en début de mois.`});
  if(exp>inc*0.35)insights.push({type:'warn',ico:'🏠',title:'Charges fixes élevées',txt:`Vos dépenses représentent ${Math.round(exp/inc*100)}% de vos revenus. Cherchez à réduire les postes variables.`});
  if(bal<0)insights.push({type:'alert',ico:'🚨',title:'Solde négatif',txt:`Vous dépensez ${EUR(Math.abs(bal))} de plus que vous ne gagnez sur cette période.`});
  const totL=LIABS.reduce((s,l)=>s+l.amount,0);
  const totA=ASSETS.reduce((s,a)=>s+a.value,0)+POCHES.reduce((s,p)=>s+p.currentValue,0);
  if(totL>0){const ratio=totL/totA;if(ratio>0.6)insights.push({type:'alert',ico:'📉',title:'Endettement important',txt:`Vos passifs représentent ${Math.round(ratio*100)}% de vos actifs. La norme saine est sous 40%.`});}
  // diversification
  const typeCounts={};POCHES.forEach(p=>{typeCounts[p.type]=(typeCounts[p.type]||0)+1;});
  if(Object.keys(typeCounts).length<2&&POCHES.length>0)insights.push({type:'',ico:'🌐',title:'Diversifiez vos placements',txt:'Vous n\'avez qu\'un seul type de placement. ETF, SCPI, crypto et épargne se complètent bien.'});
  if(insights.length===0)insights.push({type:'good',ico:'✅',title:'Tout est en ordre',txt:'Vos finances sont équilibrées sur cette période. Continuez comme ça !'});
  return insights.slice(0,3).map(i=>`<div class="insight${i.type?' '+i.type:''}"><div class="insight-ico">${i.ico}</div><div class="insight-body"><div class="insight-title">${i.title}</div><div class="insight-txt">${i.txt}</div></div></div>`).join('');
}

function submitPocketEntry(){
  const label=(document.getElementById('pe-label')?.value||'').trim();
  const amount=parseFloat(document.getElementById('pe-amount')?.value||'');
  const date=getDateValue('pe-date');
  const newval=parseFloat(document.getElementById('pe-newval')?.value||'')||0;
  const parts=parseInt(document.getElementById('pe-parts')?.value||'')||0;
  const prixPart=parseFloat(document.getElementById('pe-prixpart')?.value||'')||0;
  const qty=parseFloat(document.getElementById('pe-qty')?.value||'')||0;
  const prixU=parseFloat(document.getElementById('pe-prixu')?.value||'')||0;
  const assetName=(document.getElementById('pe-asset')?.value||'').trim();
  const abondRate=parseFloat(document.getElementById('pe-abond-rate')?.value||'')||0;

  if(!label)return toast('Ajoutez un libellé');
  if(!amount||amount<=0)return toast('Montant invalide');
  const p=POCHES.find(x=>x.id===pocketAddId);if(!p)return;

  const entry={id:gid(),date,type:pocketEntryType,label,amount};
  // Enrichir l'entrée selon le type
  if(parts>0)entry.parts=parts;
  if(prixPart>0)entry.prixPart=prixPart;
  if(qty>0)entry.qty=qty;
  if(prixU>0)entry.prixU=prixU;
  if(assetName)entry.asset=assetName;
  p.entries.push(entry);

  // Mise à jour des métadonnées du placement
  if(pocketEntryType==='versement'||pocketEntryType==='achat'){
    p.invested+=amount;
    if(parts>0){p.parts=(p.parts||0)+parts;}
    if(prixPart>0)p.prixPart=prixPart;
    if(newval>0)p.currentValue=newval;
    else p.currentValue+=amount;
  }
  if(pocketEntryType==='abondement'){
    // L'abondement augmente la valeur mais pas le "investi personnel"
    p.currentValue+=amount;
    if(abondRate>0)entry.abondRate=abondRate;
  }
  if(pocketEntryType==='retrait'||pocketEntryType==='vente'){
    p.invested=Math.max(0,p.invested-amount);
    if(newval>0)p.currentValue=newval;
    else p.currentValue=Math.max(0,p.currentValue-amount);
  }
  if(['dividende','loyers','intérêts','staking'].includes(pocketEntryType)){
    // Revenus : ne changent pas la valeur du placement (déjà distribués)
  }
  if(pocketEntryType==='plus-value'&&newval>0)p.currentValue=newval;

  if(!p.history)p.history=[];
  p.history.push({date,value:p.currentValue,note:pocketEntryType});
  save();closePocketAdd();render();toast('Mouvement enregistré ✓');
}

    </div>`;
  } else if(editKind==='asset'){
    const a=ASSETS.find(x=>x.id===editId); if(!a)return;
    editCat=a.type;
    html=`
    <div class="form-field"><div class="f-lbl">Nom de l'actif</div><input class="f-inp" id="e-name" value="${a.name}" autocorrect="off"></div>
    <div class="form-field"><div class="f-lbl">Valeur actuelle (€)</div><input class="f-inp" id="e-amount" type="number" inputmode="decimal" value="${a.value}"></div>
    <div class="form-field"><div class="f-lbl">Variation (% · optionnel)</div><input class="f-inp" id="e-variation" type="number" inputmode="decimal" step="0.1" placeholder="Ex : 5.2 ou -3.1" value="${a.variation!=null?a.variation:''}"></div>
    <div class="form-field"><div class="f-lbl">Type</div>
      <div class="chip-row">${aTypes.map(c=>`<button class="chip${editCat===c?' on':''}" onclick="setECat('${c}')">${c}</button>`).join('')}</div>
    </div>`;
  } else if(editKind==='liab'){
    const l=LIABS.find(x=>x.id===editId); if(!l)return;
    editCat=l.type;
    html=`
    <div class="form-field"><div class="f-lbl">Nom du passif</div><input class="f-inp" id="e-name" value="${l.name}" autocorrect="off"></div>
    <div class="form-field"><div class="f-lbl">Montant restant (€)</div><input class="f-inp" id="e-amount" type="number" inputmode="decimal" value="${l.amount}"></div>
    <div class="form-field"><div class="f-lbl">Type</div>
      <div class="chip-row">${lTypes.map(c=>`<button class="chip${editCat===c?' on':''}" onclick="setECat('${c}')">${c}</button>`).join('')}</div>
    </div>`;
  } else if(editKind==='pocket'){
    const p=POCHES.find(x=>x.id===editId); if(!p)return;
    html=`
    <div class="form-field"><div class="f-lbl">Nom de la poche</div><input class="f-inp" id="e-name" value="${p.name}" autocorrect="off"></div>
    <div class="form-field"><div class="f-lbl">Valeur actuelle (€)</div><input class="f-inp" id="e-curval" type="number" inputmode="decimal" value="${p.currentValue}"></div>
    <div class="form-field"><div class="f-lbl">Montant total versé (€)</div><input class="f-inp" id="e-invested" type="number" inputmode="decimal" value="${p.invested}"></div>
    ${p.type==='SCPI'?`
    <div class="form-field"><div class="f-lbl">Nombre de parts</div><input class="f-inp" id="e-parts" type="number" inputmode="decimal" value="${p.parts}"></div>
    <div class="form-field"><div class="f-lbl">Prix par part (€)</div><input class="f-inp" id="e-prixpart" type="number" inputmode="decimal" value="${p.prixPart}"></div>
    <div class="form-field"><div class="f-lbl">Taux de rendement (%/an)</div><input class="f-inp" id="e-taux" type="number" inputmode="decimal" step="0.01" value="${p.taux}"></div>`:''}`;
  }

  document.getElementById('edit-body').innerHTML=html+`<button class="btn-go" onclick="submitEdit()" style="margin-top:4px">Enregistrer les modifications</button>`;
}

function setETxType(t){
  editTxType=t; editCat='';
  renderEditForm();
}
function setECat(c){
  editCat=c;
  // Re-render just the chips without full re-render to keep input values
  document.querySelectorAll('#edit-body .chip').forEach(btn=>{
    btn.classList.toggle('on', btn.textContent===c);
  });
}

function submitEdit(){
  if(editKind==='tx'){
    const tx=TXS.find(t=>t.id===editId); if(!tx)return;
    const label=(document.getElementById('e-label')?.value||'').trim();
    const amount=parseFloat(document.getElementById('e-amount')?.value||'');
    const date=getDateValue('e-date');
    if(!label)return toast('Ajoutez un libellé');
    if(!amount||amount<=0)return toast('Montant invalide');
    if(!editCat)return toast('Choisissez une catégorie');
    tx.label=label; tx.amount=amount; tx.date=date; tx.type=editTxType; tx.cat=editCat;
  } else if(editKind==='asset'){
    const a=ASSETS.find(x=>x.id===editId); if(!a)return;
    const name=(document.getElementById('e-name')?.value||'').trim();
    const value=parseFloat(document.getElementById('e-amount')?.value||'');
    const variationRaw=document.getElementById('e-variation')?.value;
    const variation=variationRaw!==''&&variationRaw!=null?parseFloat(variationRaw):null;
    if(!name)return toast('Ajoutez un nom');
    if(!value||value<=0)return toast('Valeur invalide');
    if(!editCat)return toast('Choisissez un type');
    a.name=name; a.value=value; a.type=editCat; a.variation=isNaN(variation)?null:variation;
  } else if(editKind==='liab'){
    const l=LIABS.find(x=>x.id===editId); if(!l)return;
    const name=(document.getElementById('e-name')?.value||'').trim();
    const amount=parseFloat(document.getElementById('e-amount')?.value||'');
    if(!name)return toast('Ajoutez un nom');
    if(!amount||amount<=0)return toast('Montant invalide');
    if(!editCat)return toast('Choisissez un type');
    l.name=name; l.amount=amount; l.type=editCat;
  } else if(editKind==='pocket'){
    const p=POCHES.find(x=>x.id===editId); if(!p)return;
    const name=(document.getElementById('e-name')?.value||'').trim();
    const curval=parseFloat(document.getElementById('e-curval')?.value||'');
    const invested=parseFloat(document.getElementById('e-invested')?.value||'');
    if(!name)return toast('Ajoutez un nom');
    if(!curval||curval<0)return toast('Valeur invalide');
    p.name=name; p.currentValue=curval;
    if(invested>=0)p.invested=invested;
    if(p.type==='SCPI'){
      const parts=parseInt(document.getElementById('e-parts')?.value||'');
      const prixPart=parseFloat(document.getElementById('e-prixpart')?.value||'');
      const taux=parseFloat(document.getElementById('e-taux')?.value||'');
      if(parts>0)p.parts=parts;
      if(prixPart>0)p.prixPart=prixPart;
      if(taux>0)p.taux=taux;
    }
  }
  save(); closeEdit(); render(); toast('Modifié ✓');
}


function swipeTx(id){swiped[id]=!swiped[id];render();}
function swipeAsset(id){swiped[id]=!swiped[id];render();}
function deleteTx(id){TXS=TXS.filter(t=>t.id!==id);swiped={};save();render();toast('Supprimé');}
function deleteItem(id,kind){
  if(kind==='asset')ASSETS=ASSETS.filter(a=>a.id!==id);
  else LIABS=LIABS.filter(l=>l.id!==id);
  swiped={};save();render();toast('Supprimé');
}
function setFilter(f){budgetFilter=f;render();}
function setBudgetTab(t){budgetTab=t;render();}

// ═══ TOAST ════════════════════════════════════════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),2200);
}

// ═══ INIT ═════════════════════════════════════════════════════════════════════
async function _boot(){
  // 1. Afficher immédiatement avec les données du cache (localStorage)
  render();

  // 2. Charger data.json (source de vérité sur GitHub Pages)
  const loaded=await loadDataJson();
  if(loaded){render();setSyncDot('ok');}

  // 3. Si GitHub API configurée, synchroniser par dessus
  if(ghCfg){setTimeout(()=>{ghPull();},400);}

  // 4. Charger Chart.js
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  s.onload=()=>{try{render();}catch(e){}};
  document.head.appendChild(s);
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',_boot);
}else{
  _boot();
}
</script>
</body>
</html>
