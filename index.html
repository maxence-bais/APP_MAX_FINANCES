<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
:root{
  --bg:#ECEEF3;--s:#FFFFFF;
  --navy:#08111F;--navy-l:#EDF0FB;
  --red:#E02D3C;--red-l:#FFF0F1;
  --amber:#E8960A;--amber-l:#FEF5DC;
  --blue:#2563EB;--blue-d:#1848C8;--blue-l:#EDF2FF;
  --indigo:#4F46E5;--indigo-l:#EEEEFF;
  --teal:#0B8A7A;--teal-l:#EAFAF7;
  --violet:#7C3AED;--violet-l:#F5F3FF;
  --t1:#08111F;--t2:#52606F;--t3:#A8B5C6;
  --bdr:#DDE2EB;
  --shadow:0 1px 2px rgba(8,17,31,.05),0 4px 14px rgba(8,17,31,.08);
  --shadow-sm:0 1px 2px rgba(8,17,31,.04),0 2px 8px rgba(8,17,31,.05);
  --shadow-lg:0 4px 6px rgba(8,17,31,.04),0 12px 28px rgba(8,17,31,.1);
  --r:14px;--r-sm:10px;--r-lg:18px;--r-xl:24px;
  --st:env(safe-area-inset-top,44px);
  --sb:env(safe-area-inset-bottom,20px);
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;color:var(--t1);font-size:14px;line-height:1.5;}
#app{max-width:430px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.status{height:var(--st);background:var(--s);flex-shrink:0;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;overscroll-behavior:contain;}
/* Padding bottom = tabbar height (56px) + safe area bottom + small buffer */
.screen{padding:14px 14px 80px;}

/* ── TOPBAR ── */
.topbar{background:var(--s);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);flex-shrink:0;gap:8px;}
.app-name{font-size:16px;font-weight:800;letter-spacing:-.04em;color:var(--t1);display:flex;align-items:center;gap:0;}
.app-name span{color:var(--blue);}
.topbar-right{display:flex;align-items:center;gap:6px;}
.range-pill{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--bdr);border-radius:20px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);transition:background .12s;white-space:nowrap;}
.range-pill:active{background:var(--bdr);}
.range-pill svg{width:9px;height:9px;stroke:var(--t2);flex-shrink:0;}
.sync-btn{display:flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--bdr);border-radius:20px;padding:5px 8px;cursor:pointer;font-family:inherit;transition:background .12s;}
.sync-btn:active{background:var(--bg);}

/* ── TABBAR ── */
/* position:sticky on bottom of flex container — works in all contexts incl. iframes */
.tabbar{position:sticky;bottom:0;background:var(--s);border-top:1px solid var(--bdr);display:flex;z-index:100;flex-shrink:0;height:56px;padding-bottom:env(safe-area-inset-bottom,0px);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;font-size:9px;font-weight:700;color:var(--t3);font-family:inherit;transition:color .18s,transform .18s;letter-spacing:.01em;-webkit-tap-highlight-color:transparent;}
.tab svg{width:20px;height:20px;stroke-width:1.8;transition:transform .22s cubic-bezier(.34,1.56,.64,1),stroke .18s;}
.tab.active{color:var(--blue);}
.tab.active svg{stroke:var(--blue);transform:scale(1.15);}
.tab:active{transform:scale(.94);}
.tab-add{flex:0 0 64px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tab-add-inner{width:44px;height:44px;border-radius:13px;background:var(--blue);display:flex;align-items:center;justify-content:center;margin-top:-8px;box-shadow:0 4px 16px rgba(37,99,235,.38);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .15s;}
.tab-add-inner:active{transform:scale(.88);box-shadow:0 2px 8px rgba(37,99,235,.2);}
.tab-add-inner svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;}

/* ── PAGE TRANSITIONS ── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.screen{animation:fadeSlideIn .22s ease forwards;}
.card{animation:scaleIn .2s ease forwards;}

/* Staggered cards */
.card:nth-child(1){animation-delay:.02s}
.card:nth-child(2){animation-delay:.04s}
.card:nth-child(3){animation-delay:.06s}
.card:nth-child(4){animation-delay:.08s}
.card:nth-child(5){animation-delay:.10s}

/* ── SHEET ANIMATIONS ── */
.sheet-bg{position:fixed;inset:0;background:rgba(8,17,31,0);z-index:300;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;transition:background .25s ease;}
.sheet-bg.open{background:rgba(8,17,31,.48);pointer-events:all;}
.sheet{background:var(--s);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,0,.67,0);}
.sheet-bg.open .sheet{transform:translateY(0);transition:transform .32s cubic-bezier(.22,1,.36,1);}

/* ── KPI ANIMATIONS ── */
.kpi{animation:scaleIn .2s ease forwards;transition:transform .15s,box-shadow .15s;}
.kpi:active{transform:scale(.97);}

/* ── ASSET/TX ROW ANIMATIONS ── */
.asset-item{transition:background .12s;}
.tx-item{transition:background .12s;}

/* ── BAR FILL ANIMATION ── */
.bar-fill{transition:width .6s cubic-bezier(.4,0,.2,1);}
.bl-fill{transition:width .6s cubic-bezier(.4,0,.2,1);}
.month-progress-fill{transition:width .8s cubic-bezier(.4,0,.2,1);}
.bprev-fill{transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── POCKET CARD ── */
.pocket{transition:box-shadow .18s;}
.pocket-header{transition:background .12s;}
.pocket-header:active{background:var(--bg);}
.pocket-body{animation:slideUp .2s ease forwards;}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#09152B 0%,#0D1E3E 50%,#102650 100%);border-radius:var(--r-xl);padding:18px 18px 16px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(59,123,255,.12) 0%,transparent 70%);top:-80px;right:-60px;}
.hero::after{content:'';position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(16,38,80,.8) 0%,transparent 70%);bottom:-30px;left:10px;}
.hero-z{position:relative;z-index:1;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hero-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.12em;}
.hero-toggle{display:flex;background:rgba(255,255,255,.07);border-radius:20px;padding:2px;gap:1px;}
.htog{border:none;background:transparent;color:rgba(255,255,255,.35);font-size:10px;font-weight:700;padding:5px 12px;border-radius:18px;cursor:pointer;font-family:inherit;transition:all .16s;}
.htog.on{background:rgba(255,255,255,.15);color:#fff;}
.hero-val{font-size:clamp(26px,7.5vw,36px);font-weight:800;color:#fff;letter-spacing:-.05em;line-height:1;margin-bottom:16px;}
.hero-row{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;gap:0;align-items:center;}
.hero-divider{width:1px;height:28px;background:rgba(255,255,255,.07);}
.hero-stat{padding:0 6px;}
.hero-stat label{font-size:8px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px;}
.hero-stat span{font-size:clamp(10px,3vw,12px);font-weight:700;color:#fff;}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.kpi{background:var(--s);border-radius:var(--r);padding:12px 13px 11px;box-shadow:var(--shadow-sm);min-width:0;}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px;}
.kpi-val{font-size:clamp(14px,4.5vw,20px);font-weight:800;letter-spacing:-.03em;color:var(--t1);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kpi-delta{font-size:10px;font-weight:700;margin-top:3px;}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.bb{background:var(--blue-l);color:var(--blue-d);}
.br{background:var(--red-l);color:var(--red);}
.ba{background:var(--amber-l);color:var(--amber);}
.bn{background:var(--navy-l);color:var(--navy);}

/* ── CARD ── */
.card{background:var(--s);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px;}
.card-head{padding:14px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:3px;}
.card-title{font-size:13px;font-weight:800;color:var(--t1);letter-spacing:-.02em;}
.card-sub{font-size:11px;color:var(--t2);margin-top:2px;font-weight:500;}
.card-link{font-size:11px;font-weight:700;color:var(--blue);border:none;background:none;font-family:inherit;cursor:pointer;padding:0;white-space:nowrap;}

/* ── CHART ── */
.chart-area{padding:10px 8px 6px;position:relative;}

/* ── TX ROW ── */
.tx-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--bdr);position:relative;overflow:hidden;cursor:pointer;transition:background .12s;}
.tx-item:last-child{border-bottom:none;}
.tx-item:active{background:#F5F7FA;}
.tx-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.tx-body{flex:1;min-width:0;overflow:hidden;}
.tx-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--t2);margin-top:1px;font-weight:500;}
.tx-right{flex-shrink:0;text-align:right;}
.tx-amt{font-size:14px;font-weight:700;letter-spacing:-.01em;}
.tx-del-btn{position:absolute;right:-145px;top:0;bottom:0;width:143px;display:flex;gap:0;transition:right .2s ease;}
.tx-item.swiped .tx-del-btn{right:0;}
.tx-item.swiped .tx-right{opacity:0;}
.action-edit{flex:1;background:var(--blue-d);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}
.action-del{flex:1;background:var(--red);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}

/* ── BARS ── */
.bar-rows{padding:12px 16px 16px;display:flex;flex-direction:column;gap:13px;}
.bar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.bar-nm{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--t1);}
.bar-dot{width:8px;height:8px;border-radius:50%;}
.bar-amts{font-size:12px;color:var(--t2);font-weight:600;}
.bar-track{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}

/* ── ASSET ROW ── */
.asset-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--bdr);position:relative;overflow:hidden;cursor:pointer;transition:background .12s;min-height:56px;}
.asset-item:last-child{border-bottom:none;}
.asset-item:active{background:#F5F7FA;}
.asset-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.asset-body{flex:1;min-width:0;}
.asset-nm{font-size:13px;font-weight:600;color:var(--t1);}
.asset-tp{font-size:11px;color:var(--t2);margin-top:1px;font-weight:500;}
.asset-right{flex-shrink:0;text-align:right;}
.asset-val{font-size:14px;font-weight:700;}
.asset-pct{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:3px;display:inline-block;}
.asset-del{position:absolute;right:-145px;top:0;bottom:0;width:143px;display:flex;gap:0;transition:right .2s ease;}
.asset-item.swiped .asset-del{right:0;}
.asset-item.swiped .asset-right{opacity:0;}

/* ── DONUT ── */
.donut-wrap{padding:14px 16px 16px;display:flex;flex-direction:column;align-items:stretch;gap:16px;}
.donut-canvas-wrap{width:160px;height:160px;margin:0 auto;position:relative;}
.donut-canvas{width:100%!important;height:100%!important;}
.donut-legend{width:100%;display:flex;flex-direction:column;gap:9px;padding:0 2px;}
.dl-row{display:flex;align-items:center;justify-content:space-between;}
.dl-l{display:flex;align-items:center;gap:8px;}
.dl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dl-nm{font-size:12px;font-weight:600;color:var(--t1);}
.dl-r{font-size:12px;font-weight:700;color:var(--t1);}
.dl-p{font-size:11px;color:var(--t2);margin-left:4px;}

/* ── CASHFLOW MONTH ── */
.cf-month-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.cf-month-row:last-child{border-bottom:none;}
.cf-month-row:active{background:var(--bg);}
.cf-month-lbl{font-size:13px;font-weight:600;color:var(--t1);}
.cf-month-right{display:flex;align-items:center;gap:10px;}
.cf-month-val{font-size:13px;font-weight:700;}
.cf-chevron{font-size:12px;color:var(--t3);transition:transform .2s;}
.cf-chevron.open{transform:rotate(90deg);}
.cf-detail{background:var(--bg);border-bottom:1px solid var(--bdr);}
.cf-detail-row{display:flex;justify-content:space-between;padding:8px 20px;border-bottom:1px solid rgba(0,0,0,.04);}
.cf-detail-row:last-child{border-bottom:none;}
.cf-det-lbl{font-size:12px;color:var(--t2);font-weight:500;}
.cf-det-val{font-size:12px;font-weight:700;color:var(--t1);}

/* ── POCKET CARDS ── */
.pocket{background:var(--s);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.pocket-header{padding:15px 16px 13px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.pocket-header:active{background:var(--bg);}
.pocket-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.pocket-info{flex:1;min-width:0;}
.pocket-name{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.01em;}
.pocket-sub{font-size:11px;color:var(--t2);margin-top:2px;font-weight:500;}
.pocket-right{text-align:right;flex-shrink:0;}
.pocket-val{font-size:clamp(13px,4vw,16px);font-weight:800;color:var(--t1);letter-spacing:-.02em;}
.pocket-perf{font-size:11px;font-weight:700;margin-top:2px;}
.pocket-body{border-top:1px solid var(--bdr);}
.pocket-body.hidden{display:none;}
.p-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);}
.p-stat{background:var(--s);padding:12px 14px;}
.p-stat-lbl{font-size:9.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.p-stat-val{font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.02em;}
.p-stat-sub{font-size:10px;color:var(--t3);margin-top:1px;}
.p-entries{padding:0;}
.p-entry{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--bdr);}
.p-entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.p-entry-lbl{flex:1;font-size:12px;color:var(--t1);font-weight:600;}
.p-entry-dt{font-size:11px;color:var(--t2);font-weight:500;}
.p-entry-val{font-size:12px;font-weight:700;}
.pocket-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:none;background:transparent;width:100%;font-family:inherit;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;border-top:1px solid var(--bdr);transition:background .1s;}
.pocket-add-btn:active{background:var(--bg);}

/* ── SECTION TITLE ── */
.sec-title{font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:6px;}

/* ── FILTER PILLS ── */
.fpill-row{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.fpill-row::-webkit-scrollbar{display:none;}
.fpill{padding:7px 15px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--s);font-size:11px;font-weight:700;color:var(--t2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s;}
.fpill.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.empty{padding:32px;text-align:center;color:var(--t3);font-size:13px;font-weight:500;}

/* ── SHEETS ── */
/* ── SHEET BODY ── */
.sheet-handle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:14px auto 0;}
.sheet-top{padding:16px 20px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-size:17px;font-weight:800;letter-spacing:-.03em;}
.sheet-x{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px;line-height:1;}
.sheet-body{padding:20px;}
.form-field{margin-bottom:18px;}
.f-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;}
.f-inp{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:var(--r-sm);padding:12px 14px;font-size:15px;color:var(--t1);font-family:inherit;outline:none;transition:border-color .15s,background .15s;}
.f-inp:focus{border-color:var(--blue);background:#fff;}
.f-inp::placeholder{color:var(--t3);}
.seg{display:flex;gap:7px;}
.seg-o{flex:1;padding:10px 0;border-radius:var(--r-sm);border:1.5px solid var(--bdr);background:var(--s);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;text-align:center;transition:all .14s;}
.seg-o.on-exp{border-color:var(--red);background:var(--red-l);color:var(--red);}
.seg-o.on-inc{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.seg-o.on-sel{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:7px 13px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--s);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .12s;}
.chip.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.btn-go{width:100%;padding:15px;border-radius:var(--r-sm);background:linear-gradient(145deg,var(--navy),#152038);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:inherit;margin-top:4px;letter-spacing:-.01em;box-shadow:0 4px 14px rgba(10,22,40,.22);}
.btn-go:active{opacity:.88;}

/* ── ICON PICKER ── */
.icon-preview{width:52px;height:52px;border-radius:14px;background:var(--bg);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:border-color .15s;flex-shrink:0;}
.icon-preview:hover{border-color:var(--blue);}
.icon-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px;}
.icon-grid::-webkit-scrollbar{width:3px;}
.icon-grid::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}
.icon-btn{width:100%;aspect-ratio:1;border-radius:10px;border:1.5px solid transparent;background:var(--bg);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.icon-btn.sel{border-color:var(--blue);background:var(--blue-l);}
.icon-btn:hover{background:var(--navy-l);}

/* ── ADD TABS ── */
.add-tabs{display:flex;gap:0;background:var(--bg);border-radius:var(--r-sm);padding:3px;margin-bottom:18px;}
.add-tab{flex:1;padding:9px 0;border:none;background:transparent;border-radius:calc(var(--r-sm) - 2px);font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.add-tab.on{background:var(--s);color:var(--t1);box-shadow:0 1px 4px rgba(10,22,40,.1);}

/* ── INSIGHT CARD ── */
.insight{background:linear-gradient(135deg,var(--blue-l),#F0F4FF);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;border-left:3px solid var(--blue);display:flex;gap:12px;align-items:flex-start;}
.insight.warn{background:linear-gradient(135deg,var(--amber-l),#FFFBF0);border-left-color:var(--amber);}
.insight.good{background:linear-gradient(135deg,var(--teal-l),#F0FDF9);border-left-color:var(--teal);}
.insight.alert{background:linear-gradient(135deg,var(--red-l),#FFF5F5);border-left-color:var(--red);}
.insight-ico{font-size:20px;flex-shrink:0;margin-top:1px;}
.insight-body{}
.insight-title{font-size:12px;font-weight:800;color:var(--t1);margin-bottom:3px;}
.insight-txt{font-size:11px;color:var(--t2);line-height:1.5;font-weight:500;}

/* ── HEALTH SCORE ── */
.score-ring{width:80px;height:80px;flex-shrink:0;}
.score-val{font-size:22px;font-weight:800;letter-spacing:-.04em;}
.score-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bdr);}
.alert-row:last-child{border-bottom:none;}
.alert-ico{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-body{flex:1;}
.alert-title{font-size:12px;font-weight:700;color:var(--t1);}
.alert-txt{font-size:11px;color:var(--t2);margin-top:1px;font-weight:500;line-height:1.45;}
.top-cat-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bdr);}
.top-cat-row:last-child{border-bottom:none;}

/* ── BUDGET TABS ── */
.btab-row{display:flex;gap:0;background:var(--s);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:4px;margin-bottom:14px;}
.btab{flex:1;padding:8px 0;border:none;background:transparent;border-radius:calc(var(--r) - 3px);font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.btab.on{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(8,17,31,.2);}

/* ── INTRAMONTH ── */
.month-progress{height:6px;background:var(--bdr);border-radius:4px;overflow:hidden;margin:8px 0 4px;}
.month-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),#5B9BFF);transition:width .5s ease;}
.budget-line{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bdr);}
.budget-line:last-child{border-bottom:none;}
.bl-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.bl-body{flex:1;min-width:0;}
.bl-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:5px;}
.bl-track{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.bl-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.bl-right{text-align:right;flex-shrink:0;}
.bl-val{font-size:13px;font-weight:800;color:var(--t1);}
.bl-plan{font-size:10px;color:var(--t2);margin-top:2px;}
.day-bar-wrap{display:flex;align-items:flex-end;gap:2px;height:40px;padding:0 16px 10px;}
.day-bar{flex:1;border-radius:2px 2px 0 0;transition:height .3s ease;min-height:2px;}
.forecast-line{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bdr);}
.forecast-line:last-child{border-bottom:none;}
.fl-left{display:flex;align-items:center;gap:8px;}
.fl-ico{font-size:14px;}
.fl-lbl{font-size:12px;font-weight:600;color:var(--t1);}
.fl-sub{font-size:10px;color:var(--t2);margin-top:1px;}
.fl-val{font-size:13px;font-weight:800;}

/* ── BUDGET PRÉVISIONNEL ── */
.bprev-row{padding:11px 16px;border-bottom:1px solid var(--bdr);}
.bprev-row:last-child{border-bottom:none;}
.bprev-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.bprev-cat{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--t1);}
.bprev-amts{text-align:right;}
.bprev-real{font-size:13px;font-weight:700;color:var(--t1);}
.bprev-plan{font-size:10px;color:var(--t2);margin-top:1px;}
.bprev-track{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bprev-fill{height:100%;border-radius:4px;transition:width .4s ease;}

/* ── ASSET SHEET ── */
.asheet-btn{width:100%;padding:13px 16px;border-radius:var(--r-sm);border:1.5px solid var(--bdr);background:var(--s);font-size:14px;font-weight:700;color:var(--t1);cursor:pointer;font-family:inherit;text-align:left;transition:background .1s;}
.asheet-btn:active{background:var(--bg);}
.asheet-btn-main{background:var(--navy);color:#fff;border-color:var(--navy);}
.asheet-btn-main:active{opacity:.88;}
.asheet-btn-del{color:var(--red);border-color:var(--red-l);}

/* ── GOALS ── */
.goal-item{padding:13px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.goal-item:last-child{border-bottom:none;}
.goal-item:active{background:var(--bg);}
.goal-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.goal-ico{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.goal-info{flex:1;min-width:0;}
.goal-name{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.goal-meta{font-size:11px;color:var(--t2);margin-top:1px;font-weight:500;}

<script>
// ═══ CONSTANTS ════════════════════════════════════════════════════════════════
const KEY='maxind_v2';
const gid=()=>Math.random().toString(36).substr(2,9);
const EUR=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const EUR2=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const PCT=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const MONTHS_S=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const MONTHS_L=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

// Dépenses fixes = récurrentes prévisibles ; le reste = variables
const FIXED_CATS=new Set(['Logement','Transport','Abonnements','Épargne salariale']);

const CAT_C={Logement:'#F59E0B',Transport:'#3B82F6',Alimentation:'#EF4444',Santé:'#EC4899',Loisirs:'#8B5CF6',Abonnements:'#6366F1',Sorties:'#F97316',Shopping:'#64748B',Salaire:'#1D4ED8',Investissements:'#0EA5E9',Freelance:'#8B5CF6',Autre:'#94A3B8','Loyers SCPI':'#7C3AED','Dividendes PEA':'#0D9488','Épargne salariale':'#F59E0B','Livret A':'#10B981','Assurance Vie':'#6366F1','PEA':'#0D9488','Crypto':'#F97316','Autre épargne':'#10B981'};
const CAT_E={Logement:'🏠',Transport:'🚗',Alimentation:'🍽️',Santé:'🩺',Loisirs:'🎬',Abonnements:'📡',Sorties:'🥂',Shopping:'🛍️',Salaire:'💳',Investissements:'📈',Freelance:'💻','Loyers SCPI':'🏢','Dividendes PEA':'📊','Épargne salariale':'🏗️','Livret A':'💰','Assurance Vie':'🛡️','PEA':'📈','Crypto':'🔐','Autre épargne':'💰',Autre:'🔹'};
const AST_C={Immobilier:'#F59E0B',Épargne:'#0D9488',Investissements:'#3B82F6',SCPI:'#7C3AED',PEA:'#0D9488','Épargne salariale':'#F59E0B',Crypto:'#F97316',Véhicule:'#64748B',Autre:'#94A3B8',Actions:'#1D4ED8',ETF:'#0EA5E9','Assurance-Vie':'#6366F1',Livret:'#10B981'};
const AST_E={Immobilier:'🏡',Épargne:'💰',Investissements:'📊',SCPI:'🏢',PEA:'📈','Épargne salariale':'💼',Crypto:'🔐',Véhicule:'🚗',Autre:'🔹',Actions:'📉',ETF:'🌐','Assurance-Vie':'🛡️',Livret:'🏦'};

// ═══ DATA ═════════════════════════════════════════════════════════════════════
let TXS=[];
let ASSETS=[];
let LIABS=[];
let POCHES=[];
let GOALS=[];
// ─── BUDGETS PRÉVISIONNELS ── {id, name, period:'monthly'|'annual', items:[{cat, type, planned}]}
let BUDGETS=[];

// ═══ CHARGEMENT DES DONNÉES ═══════════════════════════════════════════════════
// 1. localStorage (cache offline)
// 2. data.json (GitHub Pages)
// 3. GitHub API (si token configuré)

function applyData(s){
  if(s.TXS)TXS=s.TXS;
  if(s.ASSETS)ASSETS=s.ASSETS;
  if(s.LIABS)LIABS=s.LIABS;
  if(s.POCHES)POCHES=s.POCHES;
  if(s.GOALS)GOALS=s.GOALS;
    if(s.BUDGETS)BUDGETS=s.BUDGETS;
}

// Essayer localStorage en premier (instantané, hors-ligne)
try{
  const cached=JSON.parse(localStorage.getItem(KEY)||'null');
  if(cached&&cached.TXS)applyData(cached);
}catch(e){}

async function loadDataJson(){
  try{
    const r=await fetch('./data.json?t='+Date.now());
    if(!r.ok)return false;
    const data=await r.json();
    applyData(data);
    localStorage.setItem(KEY,JSON.stringify({TXS,ASSETS,LIABS,POCHES,GOALS,BUDGETS}));
    return true;
  }catch(e){return false;}
}

// ═══ GITHUB SYNC ══════════════════════════════════════════════════════════════
const GH_KEY='maxind_gh';
let ghCfg=null;
let ghFileSha=null; // SHA du fichier sur GitHub (nécessaire pour le PUT)
let syncTimer=null;

function loadGhCfg(){
  try{ghCfg=JSON.parse(localStorage.getItem(GH_KEY)||'null');}catch(e){ghCfg=null;}
}
loadGhCfg();

function setSyncDot(state){ // 'ok'|'err'|'spin'|'off'
  const d=document.getElementById('sync-dot');
  if(!d)return;
  d.className='sync-dot'+(state!=='off'?' '+state:'');
}

function ghHeaders(){
  return{'Authorization':'token '+ghCfg.token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
}
function ghUrl(){
  // Toujours data.json à la racine du repo
  return`https://api.github.com/repos/${ghCfg.owner}/${ghCfg.repo}/contents/data.json`;
}

async function ghPull(){
  if(!ghCfg)return;
  setSyncDot('spin');
  try{
    const r=await fetch(ghUrl(),{headers:ghHeaders()});
    if(r.status===404){setSyncDot('ok');return;} // fichier pas encore créé
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    ghFileSha=j.sha;
    const b64=j.content.replace(/\n/g,'');
    // atob() returns binary string — must decode as UTF-8 to preserve accents
    const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const text=new TextDecoder('utf-8').decode(bytes);
    const data=JSON.parse(text);
    if(data.TXS)TXS=data.TXS;
    if(data.ASSETS)ASSETS=data.ASSETS;
    if(data.LIABS)LIABS=data.LIABS;
    if(data.POCHES)POCHES=data.POCHES;
    if(data.GOALS)GOALS=data.GOALS;
    localStorage.setItem(KEY,JSON.stringify({TXS,ASSETS,LIABS,POCHES,GOALS,BUDGETS}));
    setSyncDot('ok');
    render();
    toast('✓ Données synchronisées');
  }catch(err){
    setSyncDot('err');
    toast('Erreur sync GitHub');
    console.error(err);
  }
}

async function ghPush(){
  if(!ghCfg)return;
  setSyncDot('spin');
  const payload={TXS,ASSETS,LIABS,POCHES,GOALS,BUDGETS};
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
  const body={message:'sync: update finances data',content};
  if(ghFileSha)body.sha=ghFileSha;
  try{
    const r=await fetch(ghUrl(),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    if(!r.ok){const t=await r.text();throw new Error('HTTP '+r.status+' '+t);}
    const j=await r.json();
    ghFileSha=j.content?.sha||ghFileSha;
    setSyncDot('ok');
  }catch(err){
    setSyncDot('err');
    toast('Erreur push GitHub');
    console.error(err);
  }
}

function save(){
  try{localStorage.setItem(KEY,JSON.stringify({TXS,ASSETS,LIABS,POCHES,GOALS,BUDGETS}));}catch(e){}
  // Debounce push: attend 1.5s après la dernière modif
  if(ghCfg){
    clearTimeout(syncTimer);
    setSyncDot('spin');
    syncTimer=setTimeout(ghPush,1500);
  }
}

// ── Config sheet ──
// ── Settings sheet ──
function openSettings(){
  loadGhCfg();
  const syncStatus=ghCfg
    ?`<div style="display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--bdr)">
        <div class="sync-dot on" style="width:8px;height:8px"></div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--t1)">Connecté à GitHub</div>
        <div style="font-size:11px;color:var(--t2);margin-top:1px">${ghCfg.owner}/${ghCfg.repo}</div></div>
        <button onclick="forcePush()" style="background:var(--blue-l);color:var(--blue-d);border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Forcer sync ↑</button>
      </div>`
    :`<div style="padding:12px 0;border-bottom:1px solid var(--bdr)">
        <div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px">GitHub non configuré</div>
        <div style="font-size:11px;color:var(--t2)">Sans sync, les données ne sont stockées que dans ce navigateur.</div>
      </div>`;

  document.getElementById('settings-body').innerHTML=`
  <div style="margin-bottom:20px">
    <div class="f-lbl" style="margin-bottom:10px">Synchronisation GitHub</div>
    ${syncStatus}
    <div class="form-field" style="margin-top:14px">
      <div class="f-lbl">Personal Access Token</div>
      <input class="f-inp" id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxx" autocorrect="off" autocomplete="off" value="${ghCfg?.token||''}">
      <div style="font-size:11px;color:var(--t2);margin-top:5px">Créer sur <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--blue);font-weight:700">github.com/settings/tokens</a> — scope : <strong>repo</strong></div>
    </div>
    <div class="form-field">
      <div class="f-lbl">Username GitHub</div>
      <input class="f-inp" id="gh-owner" placeholder="ex : jean-dupont" autocorrect="off" autocapitalize="none" value="${ghCfg?.owner||''}">
    </div>
    <div class="form-field">
      <div class="f-lbl">Nom du repo</div>
      <input class="f-inp" id="gh-repo" placeholder="ex : max-finances" autocorrect="off" autocapitalize="none" value="${ghCfg?.repo||''}">
      <div style="font-size:11px;color:var(--t2);margin-top:5px">Les données seront dans <strong>data.json</strong> à la racine.</div>
    </div>
    <button class="btn-go" onclick="saveGhConfig()">💾 Enregistrer et synchroniser</button>
    ${ghCfg?`<button onclick="clearGhConfig()" style="width:100%;margin-top:8px;padding:12px;border-radius:var(--r-sm);border:1.5px solid var(--bdr);background:transparent;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;font-family:inherit">Déconnecter GitHub</button>`:''}
    <div id="gh-status" style="margin-top:10px;font-size:12px;text-align:center;color:var(--t2)"></div>
  </div>

  <div style="border-top:1px solid var(--bdr);padding-top:16px">
    <div class="f-lbl" style="margin-bottom:10px">Données locales</div>
    <button onclick="exportData()" class="asheet-btn" style="margin-bottom:8px">📤 Exporter les données (JSON)</button>
    <button onclick="document.getElementById('import-input').click()" class="asheet-btn" style="margin-bottom:4px">📥 Importer des données (JSON)</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(this)">
    <div style="font-size:11px;color:var(--t2);margin-top:6px">L'export crée un fichier data.json téléchargeable. Garde-le comme sauvegarde.</div>
  </div>`;

  document.getElementById('settings-bg').classList.add('open');
}
function closeSettings(){document.getElementById('settings-bg').classList.remove('open');}

async function saveGhConfig(){
  const token=(document.getElementById('gh-token').value||'').trim();
  const owner=(document.getElementById('gh-owner').value||'').trim();
  const repo=(document.getElementById('gh-repo').value||'').trim();
  if(!token||!owner||!repo)return toast('Tous les champs sont requis');
  ghCfg={token,owner,repo};
  ghFileSha=null;
  localStorage.setItem(GH_KEY,JSON.stringify(ghCfg));

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.TXS)TXS=data.TXS;
      if(data.ASSETS)ASSETS=data.ASSETS;
      if(data.LIABS)LIABS=data.LIABS;
      if(data.POCHES)POCHES=data.POCHES;
      if(data.GOALS)GOALS=data.GOALS;
      if(data.BUDGETS)BUDGETS=data.BUDGETS;
      save();render();closeSettings();
      toast('✓ Données importées');
    }catch(err){toast('Fichier invalide');}
  };
  reader.readAsText(file);
}

  const pmSav=pmTx.filter(t=>t.type==='savings').reduce((s,t)=>s+t.amount,0);

    const totL=LIABS.reduce((s,l)=>s+l.amount,0);
    const totA=ASSETS.reduce((s,a)=>s+a.value,0)+POCHES.reduce((s,p)=>s+p.currentValue,0);
    if(totL>0){const r=totL/totA;if(r<0.3)s+=10;else if(r>0.6)s-=15;}

  const topRows=Object.entries(topCats).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topTotal=topRows.reduce((s,[,v])=>s+v,0);

  // ── Projection fin de mois ──
  const daysInMonth=mEnd.getDate();
  const dayNow=now2.getDate();
  const projExp=dayNow>0?Math.round(exp/dayNow*daysInMonth):exp;

      }

  if(rate<10&&inc>0)alerts.push({type:'warn',ico:'💡',title:'Taux d\'épargne faible',txt:`${rate}% épargné ce mois. Objectif recommandé : 20%. Automatisez un virement en début de mois.`});
  const topCatEntry=topRows[0];

function getCFMonths(){
  // Toujours les 3 derniers mois complets, indépendant du filtre de période
  const now=new Date();
  const months=[];
  for(let offset=0;offset<3;offset++){
    const d=new Date(now.getFullYear(),now.getMonth()-offset,1);
    const y=d.getFullYear(),mo=d.getMonth();
    const s=new Date(y,mo,1),e=new Date(y,mo+1,0,23,59,59,999);
    const txMonth=TXS.filter(t=>{const dt=new Date(t.date);return dt>=s&&dt<=e;});
    const inc   =Math.round(txMonth.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0));
    const expAll=txMonth.filter(t=>t.type==='expense');
    const fixed =Math.round(expAll.filter(t=>FIXED_CATS.has(t.cat)).reduce((a,t)=>a+t.amount,0));
    const variable=Math.round(expAll.filter(t=>!FIXED_CATS.has(t.cat)).reduce((a,t)=>a+t.amount,0));
    const sav   =Math.round(txMonth.filter(t=>t.type==='savings').reduce((a,t)=>a+t.amount,0));
    const net   =inc-fixed-variable-sav;
    // détail par cat pour le expand
    const byFixed={},byVar={};
    expAll.forEach(t=>{
      if(FIXED_CATS.has(t.cat)){if(!byFixed[t.cat])byFixed[t.cat]=0;byFixed[t.cat]+=t.amount;}
      else{if(!byVar[t.cat])byVar[t.cat]=0;byVar[t.cat]+=t.amount;}
    });
    const bySav={};txMonth.filter(t=>t.type==='savings').forEach(t=>{if(!bySav[t.cat])bySav[t.cat]=0;bySav[t.cat]+=t.amount;});
    months.push({key:y+'-'+mo,label:MONTHS_S[mo]+' '+y,inc,fixed,variable,sav,net,byFixed,byVar,bySav,mo,yr:y});
  }
  return months;
}

function renderBudget(){
  const now=new Date();
  const curY=now.getFullYear(),curM=now.getMonth(),curD=now.getDate();
  const daysInMonth=new Date(curY,curM+1,0).getDate();
  const monthPct=Math.round(curD/daysInMonth*100);
  const b=getActiveBudget();

  const tabs=`<div class="btab-row">
    <button class="btab${budgetTab==='month'?' on':''}" onclick="setBudgetTab('month')">Mois en cours</button>
    <button class="btab${budgetTab==='forecast'?' on':''}" onclick="setBudgetTab('forecast')">Prévisionnel</button>
    <button class="btab${budgetTab==='txs'?' on':''}" onclick="setBudgetTab('txs')">Transactions</button>
  </div>`;

  if(budgetTab==='month') return tabs+renderBudgetMonth(now,curY,curM,curD,daysInMonth,monthPct,b);
  if(budgetTab==='forecast') return tabs+renderBudgetForecast(now,curY,curM,b);
  return tabs+renderBudgetTxs();
}

function renderBudgetMonth(now,curY,curM,curD,daysInMonth,monthPct,b){
  const mStart=new Date(curY,curM,1),mEnd=new Date(curY,curM+1,0,23,59,59,999);
  const mTx=TXS.filter(t=>{const d=new Date(t.date);return d>=mStart&&d<=mEnd;});
  const mInc =Math.round(mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0));
  const mExpAll=mTx.filter(t=>t.type==='expense');
  const mFixed=Math.round(mExpAll.filter(t=>FIXED_CATS.has(t.cat)).reduce((s,t)=>s+t.amount,0));
  const mVar  =Math.round(mExpAll.filter(t=>!FIXED_CATS.has(t.cat)).reduce((s,t)=>s+t.amount,0));
  const mSav  =Math.round(mTx.filter(t=>t.type==='savings').reduce((s,t)=>s+t.amount,0));
  const mNet  =mInc-mFixed-mVar-mSav;

  const plannedFixed =b?b.items.filter(i=>i.type==='expense'&&FIXED_CATS.has(i.cat)).reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):0;
  const plannedVar   =b?b.items.filter(i=>i.type==='expense'&&!FIXED_CATS.has(i.cat)).reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):0;
  const plannedSav   =b?b.items.filter(i=>i.type==='savings').reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):0;
  const plannedInc   =b?b.items.filter(i=>i.type==='income').reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):mInc;

  const byDay=Array(daysInMonth).fill(0);
  mExpAll.forEach(t=>{const d=new Date(t.date).getDate()-1;if(d>=0&&d<daysInMonth)byDay[d]+=t.amount;});
  const dailyBurn=curD>0?Math.round((mFixed+mVar)/curD):0;
  const projectedExp=Math.round(dailyBurn*daysInMonth);
  const dailyRemaining=curD<daysInMonth?Math.round(mNet/(daysInMonth-curD)):0;
  const maxDay=Math.max(...byDay,1);
  const dayBars=byDay.slice(0,curD).map((v,i)=>{
    const pct=Math.round(v/maxDay*100);
    const isToday=i===curD-1;
    const col=v===0?'var(--bdr)':isToday?'var(--blue)':v>dailyBurn*1.3?'var(--red)':'var(--t3)';
    return`<div class="day-bar" style="background:${col};height:${Math.max(2,pct)}%"></div>`;
  }).join('');

  const budgLine=(label,ico,real,plan,col)=>{
    const pct=plan>0?Math.min(120,Math.round(real/plan*100)):0;
    const over=real>plan&&plan>0;
    return`<div class="budget-line">
      <div class="bl-ico" style="background:${col}18">${ico}</div>
      <div class="bl-body">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
          <span class="bl-title">${label}</span>
          <div class="bl-right">
            <div class="bl-val" style="color:${over?'var(--red)':col}">${EUR(real)}</div>
            ${plan>0?`<div class="bl-plan">${over?`⚠ +${EUR(real-plan)}`:`${EUR(plan-real)} restant`}</div>`:'<div class="bl-plan" style="color:var(--t3)">pas de budget</div>'}
          </div>
        </div>
        ${plan>0?`<div class="bl-track"><div class="bl-fill" style="width:${Math.min(pct,100)}%;background:${over?'var(--red)':col}"></div></div>
        <div style="font-size:9px;color:var(--t2);margin-top:3px">${pct}% utilisé · prévu ${EUR(plan)}</div>`:''}
      </div>
    </div>`;
  };

  return`
  <div class="card">
    <div style="padding:14px 16px 8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="font-size:14px;font-weight:800;color:var(--t1)">${MONTHS_L[curM]} ${curY}</div>
        <div style="font-size:11px;font-weight:700;color:var(--t2)">J${curD} / ${daysInMonth} · ${monthPct}%</div>
      </div>
      <div class="month-progress"><div class="month-progress-fill" style="width:${monthPct}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:3px">
        <div style="font-size:10px;color:var(--t2)">Moy. ${EUR(dailyBurn)}/j · projeté ${EUR(projectedExp)}</div>
        <div style="font-size:10px;font-weight:700;color:${dailyRemaining>=0?'var(--teal)':'var(--red)'}">${dailyRemaining>=0?EUR(dailyRemaining)+'/j restant':'⚠ Dépassé'}</div>
      </div>
    </div>
    <div style="padding:0 16px 8px">
      <div class="day-bar-wrap" style="padding:0">${dayBars}</div>
    </div>
  </div>

  ${(()=>{
    // ── Courbe de décaissement cumulatif réel vs budget ──
    const totalBudget=plannedFixed+plannedVar; // budget mensuel total dépenses
    // Cumul réel jour par jour
    const cumReal=[];let running=0;
    for(let d=0;d<daysInMonth;d++){
      running+=byDay[d];
      cumReal.push(running);
    }
    // Budget linéaire (ligne droite si budget défini, sinon projection burn rate)
    const budgetRef=totalBudget>0?totalBudget:projectedExp;
    const cumBudget=Array.from({length:daysInMonth},(_,i)=>Math.round(budgetRef/(daysInMonth-1)*i));

    const W=340,H=110,padX=4,padY=10;
    const maxVal=Math.max(...cumReal.slice(0,curD),budgetRef,1);
    const toX=d=>Math.round(padX+d/(daysInMonth-1)*(W-padX*2));
    const toY=v=>Math.round(padY+(1-v/maxVal)*(H-padY*2));

    // Courbe réelle (jusqu'à aujourd'hui)
    const realPts=cumReal.slice(0,curD).map((v,i)=>`${toX(i)},${toY(v)}`).join(' ');
    // Projection en pointillé (aujourd'hui → fin de mois)
    const lastReal=cumReal[curD-1]||0;
    const projPts=curD<daysInMonth?`${toX(curD-1)},${toY(lastReal)} ${toX(daysInMonth-1)},${toY(projectedExp)}`:'';
    // Ligne budget
    const budgPts=`${toX(0)},${toY(0)} ${toX(daysInMonth-1)},${toY(budgetRef)}`;

    // Fill sous la courbe réelle
    const fillReal=curD>1?`0,${H} ${realPts} ${toX(curD-1)},${H}`:null;

    // Labels axe X (début, mi-mois, fin)
    const xLabels=[1,Math.round(daysInMonth/2),daysInMonth].map(d=>`
      <text x="${toX(d-1)}" y="${H+14}" text-anchor="middle" font-size="9" fill="#A8B5C6" font-family="Plus Jakarta Sans,-apple-system,sans-serif">${d}</text>`).join('');

    // Marqueur aujourd'hui
    const todayX=toX(curD-1),todayY=toY(lastReal);
    const overBudget=lastReal>(totalBudget>0?totalBudget/daysInMonth*curD:Infinity);

    return`<div class="card">
      <div class="card-head" style="padding-bottom:8px">
        <div><div class="card-title">Décaissement cumulatif</div><div class="card-sub">Réel vs ${totalBudget>0?'budget':'projection'}</div></div>
        <div style="display:flex;gap:10px;align-items:center">
          <div style="display:flex;align-items:center;gap:4px"><div style="width:16px;height:2px;border-radius:1px;background:var(--red)"></div><span style="font-size:9px;color:var(--t2);font-weight:700">Réel</span></div>
          <div style="display:flex;align-items:center;gap:4px"><div style="width:16px;height:2px;border-radius:1px;background:var(--blue-d);opacity:.5"></div><span style="font-size:9px;color:var(--t2);font-weight:700">${totalBudget>0?'Budget':'Proj.'}</span></div>
        </div>
      </div>
      <div style="padding:4px 14px 18px;overflow:hidden">
        <svg width="100%" viewBox="0 0 ${W+padX} ${H+20}" style="display:block;overflow:visible">
          <defs>
            <linearGradient id="dcg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--red)" stop-opacity=".12"/>
              <stop offset="100%" stop-color="var(--red)" stop-opacity=".01"/>
            </linearGradient>
          </defs>
          ${fillReal?`<polygon points="${fillReal}" fill="url(#dcg)"/>`:''}
          <!-- Ligne budget/projection -->
          <polyline points="${budgPts}" fill="none" stroke="var(--blue-d)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
          <!-- Courbe réelle -->
          ${curD>1?`<polyline points="${realPts}" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`:''}
          <!-- Projection fin de mois -->
          ${projPts?`<polyline points="${projPts}" fill="none" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,3" opacity=".5"/>`:''}
          <!-- Point aujourd'hui -->
          ${curD>0?`<circle cx="${todayX}" cy="${todayY}" r="4.5" fill="${overBudget?'var(--red)':'var(--teal)'}" stroke="#fff" stroke-width="2"/>
          <text x="${todayX}" y="${todayY-10}" text-anchor="middle" font-size="10" font-weight="800" fill="${overBudget?'var(--red)':'var(--teal)'}" font-family="Plus Jakarta Sans,-apple-system,sans-serif">${EUR(lastReal)}</text>`:''}
          <!-- Labels axe X -->
          ${xLabels}
          <!-- Label budget fin de mois -->
          <text x="${toX(daysInMonth-1)}" y="${toY(budgetRef)-8}" text-anchor="end" font-size="9" fill="var(--blue-d)" font-family="Plus Jakarta Sans,-apple-system,sans-serif" opacity=".7">${EUR(budgetRef)}</text>
        </svg>
      </div>
    </div>`;
  })()}

  <div class="card">
    <div class="card-head" style="padding-bottom:6px">
      <div><div class="card-title">Vue d'ensemble</div><div class="card-sub">${b?'Comparé au budget configuré':'Sans budget — <a onclick="setBudgetTab(\'forecast\')" style="color:var(--blue);cursor:pointer;font-weight:700">en créer un ?</a>'}</div></div>
    </div>
    ${budgLine('Revenus','💳',mInc,plannedInc,'var(--blue-d)')}
    ${budgLine('Charges fixes','🔒',mFixed,plannedFixed,'var(--indigo)')}
    ${budgLine('Dépenses variables','🎲',mVar,plannedVar,'var(--red)')}
    ${budgLine('Épargne','💰',mSav,plannedSav,'var(--teal)')}
    <div style="padding:10px 16px;background:${mNet>=0?'var(--teal-l)':'var(--red-l)'};display:flex;justify-content:space-between;align-items:center;border-top:2px solid var(--bdr)">
      <span style="font-size:12px;font-weight:700;color:var(--t1)">Reste à fin de mois</span>
      <span style="font-size:16px;font-weight:800;color:${mNet>=0?'var(--teal)':'var(--red)'}">${mNet>=0?'+':''}${EUR(mNet)}</span>
    </div>
  </div>

  <div class="card">
    <div class="card-head" style="padding-bottom:6px"><div><div class="card-title">Dépenses — ${MONTHS_S[curM]}</div><div class="card-sub">${EUR(mFixed+mVar)} au total</div></div></div>
    ${(()=>{
      const cats={};mExpAll.forEach(t=>{if(!cats[t.cat])cats[t.cat]=0;cats[t.cat]+=t.amount;});
      const entries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
      const total=(mFixed+mVar)||1;
      if(entries.length===0)return'<div class="empty">Aucune dépense ce mois</div>';

      // SVG donut
      const R=54,r=34,cx=68,cy=68,SIZE=136;
      let angle=-Math.PI/2;
      const slices=entries.map(([cat,val])=>{
        const sweep=val/total*2*Math.PI;
        const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
        angle+=sweep;
        const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
        const ix1=cx+r*Math.cos(angle-sweep),iy1=cy+r*Math.sin(angle-sweep);
        const ix2=cx+r*Math.cos(angle),iy2=cy+r*Math.sin(angle);
        const large=sweep>Math.PI?1:0;
        const col=CAT_C[cat]||'#94A3B8';
        return`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${r},${r} 0 ${large},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${col}"/>`;
      }).join('');

      const legend=entries.slice(0,6).map(([cat,val])=>{
        const col=CAT_C[cat]||'#94A3B8';
        const pct=Math.round(val/total*100);
        const bItem=b?b.items.find(i=>i.cat===cat):null;
        const bPlan=bItem?(b.period==='annual'?bItem.planned/12:bItem.planned):0;
        const over=bPlan>0&&val>bPlan;
        return`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr)">
          <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
          <div style="flex:1;font-size:12px;font-weight:600;color:var(--t1)">${cat}</div>
          <div style="font-size:11px;font-weight:700;color:${over?'var(--red)':col}">${EUR(Math.round(val))}</div>
          <div style="font-size:10px;color:var(--t3);width:28px;text-align:right">${pct}%</div>
          ${bPlan>0?`<div style="font-size:9px;font-weight:700;color:${over?'var(--red)':'var(--t3)'};">${over?'⚠':'✓'}</div>`:''}
        </div>`;
      }).join('');

      return`<div style="display:flex;gap:12px;align-items:flex-start;padding:8px 16px 4px">
        <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" style="flex-shrink:0">
          ${slices}
          <circle cx="${cx}" cy="${cy}" r="${r-2}" fill="var(--s)"/>
          <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--t2)" font-family="Plus Jakarta Sans,-apple-system,sans-serif">Total</text>
          <text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="13" font-weight="800" fill="var(--t1)" font-family="Plus Jakarta Sans,-apple-system,sans-serif">${EUR(Math.round(total))}</text>
        </svg>
        <div style="flex:1;padding-top:4px">${legend}</div>
      </div>`;
    })()}
  </div>

  ${(()=>{
    const incCats={};
    mTx.filter(t=>t.type==='income').forEach(t=>{if(!incCats[t.cat])incCats[t.cat]=0;incCats[t.cat]+=t.amount;});
    const incEntries=Object.entries(incCats).sort((a,b)=>b[1]-a[1]);
    if(incEntries.length===0)return'';
    const incTotal=mInc||1;
    const R=54,r=34,cx=68,cy=68,SIZE=136;
    let angle2=-Math.PI/2;
    const slices2=incEntries.map(([cat,val])=>{
      const sweep=val/incTotal*2*Math.PI;
      const x1=cx+R*Math.cos(angle2),y1=cy+R*Math.sin(angle2);
      angle2+=sweep;
      const x2=cx+R*Math.cos(angle2),y2=cy+R*Math.sin(angle2);
      const ix1=cx+r*Math.cos(angle2-sweep),iy1=cy+r*Math.sin(angle2-sweep);
      const ix2=cx+r*Math.cos(angle2),iy2=cy+r*Math.sin(angle2);
      const large=sweep>Math.PI?1:0;
      const col=CAT_C[cat]||'#2563EB';
      return`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${r},${r} 0 ${large},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${col}"/>`;
    }).join('');
    const legend2=incEntries.map(([cat,val])=>{
      const col=CAT_C[cat]||'#2563EB';
      const pct=Math.round(val/incTotal*100);
      return`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr)">
        <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
        <div style="flex:1;font-size:12px;font-weight:600;color:var(--t1)">${cat}</div>
        <div style="font-size:11px;font-weight:700;color:${col}">${EUR(Math.round(val))}</div>
        <div style="font-size:10px;color:var(--t3);width:28px;text-align:right">${pct}%</div>
      </div>`;
    }).join('');
    return`<div class="card">
      <div class="card-head" style="padding-bottom:6px"><div><div class="card-title">Revenus — ${MONTHS_S[curM]}</div><div class="card-sub">${EUR(mInc)} au total</div></div></div>
      <div style="display:flex;gap:12px;align-items:flex-start;padding:8px 16px 4px">
        <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" style="flex-shrink:0">
          ${slices2}
          <circle cx="${cx}" cy="${cy}" r="${r-2}" fill="var(--s)"/>
          <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--t2)" font-family="Plus Jakarta Sans,-apple-system,sans-serif">Total</text>
          <text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="13" font-weight="800" fill="var(--t1)" font-family="Plus Jakarta Sans,-apple-system,sans-serif">${EUR(Math.round(incTotal))}</text>
        </svg>
        <div style="flex:1;padding-top:4px">${legend2}</div>
      </div>
    </div>`;
  })()}`;
}

function renderBudgetForecast(now,curY,curM,b){
  const nmY=curM===11?curY+1:curY, nmM=curM===11?0:curM+1;
  const avg3=(type)=>{
    let total=0;
    for(let i=1;i<=3;i++){
      const d=new Date(curY,curM-i,1),e2=new Date(curY,curM-i+1,0,23,59,59,999);
      total+=TXS.filter(t=>{const dt=new Date(t.date);return dt>=d&&dt<=e2&&t.type===type;}).reduce((s,t)=>s+t.amount,0);
    }
    return Math.round(total/3);
  };
  const plannedFixed=b?b.items.filter(i=>i.type==='expense'&&FIXED_CATS.has(i.cat)).reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):0;
  const plannedVar  =b?b.items.filter(i=>i.type==='expense'&&!FIXED_CATS.has(i.cat)).reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):0;
  const plannedSav  =b?b.items.filter(i=>i.type==='savings').reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):0;
  const plannedInc  =b?b.items.filter(i=>i.type==='income').reduce((s,i)=>s+(b.period==='annual'?i.planned/12:i.planned),0):0;
  const nmInc =b&&plannedInc>0?Math.round(plannedInc):avg3('income')||0;
  const nmFix =b?Math.round(plannedFixed):Math.round(avg3('expense')*0.6);
  const nmVar =b?Math.round(plannedVar):Math.round(avg3('expense')*0.4);
  const nmSav =b?Math.round(plannedSav):avg3('savings');
  const nmNet =nmInc-nmFix-nmVar-nmSav;
  const nmRate=nmInc>0?Math.round(nmSav/nmInc*100):0;

  // Détail par catégorie si budget configuré
  const catDetails=b?b.items.filter(i=>i.type==='expense').map(item=>{
    const plan=b.period==='annual'?item.planned/12:item.planned;
    const col=CAT_C[item.cat]||'#94A3B8';
    return`<div class="forecast-line">
      <div class="fl-left">
        <span style="font-size:14px">${CAT_E[item.cat]||'🔹'}</span>
        <div><div class="fl-lbl">${item.cat}</div></div>
      </div>
      <div class="fl-val" style="color:${FIXED_CATS.has(item.cat)?'var(--indigo)':'var(--red)'}">−${EUR(Math.round(plan))}</div>
    </div>`;
  }).join(''):'';

  return`
  ${!b?`<div class="card" style="border:2px dashed var(--blue);background:var(--blue-l)">
    <div style="padding:16px">
      <div style="font-size:13px;font-weight:800;color:var(--blue-d);margin-bottom:4px">Aucun budget configuré</div>
      <div style="font-size:12px;color:var(--blue-d);opacity:.8;margin-bottom:12px">Définissez vos enveloppes pour avoir un prévisionnel précis. Pour l'instant, les chiffres sont basés sur vos 3 derniers mois.</div>
      <button class="btn-go" onclick="openBPrev()" style="background:var(--blue);font-size:13px;padding:11px">+ Créer mon budget</button>
    </div>
  </div>`:''}

  <div class="card">
    <div class="card-head" style="padding-bottom:8px">
      <div>
        <div class="card-title">Prévisionnel — ${MONTHS_L[nmM]} ${nmY}</div>
        <div class="card-sub">${b?`Budget ${b.period==='monthly'?'mensuel':'annuel ÷12'}`:'Moyenne 3 derniers mois'}</div>
      </div>
      <button class="card-link" onclick="openBPrev()">${b?'✏️ Modifier':'Configurer'}</button>
    </div>
    <div class="forecast-line">
      <div class="fl-left"><span class="fl-ico">💳</span><div><div class="fl-lbl">Revenus</div></div></div>
      <div class="fl-val" style="color:var(--blue-d)">+${EUR(nmInc)}</div>
    </div>
    <div class="forecast-line" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <div class="fl-left"><span class="fl-ico">🔒</span><div><div class="fl-lbl">Charges fixes</div><div class="fl-sub">Récurrentes · tap pour détail</div></div></div>
      <div class="fl-val" style="color:var(--indigo)">−${EUR(nmFix)}</div>
    </div>
    <div style="display:none">${b?b.items.filter(i=>i.type==='expense'&&FIXED_CATS.has(i.cat)).map(item=>`<div style="padding:6px 16px 6px 50px;display:flex;justify-content:space-between;border-bottom:1px solid var(--bdr)"><span style="font-size:11px;color:var(--t2)">${CAT_E[item.cat]||''} ${item.cat}</span><span style="font-size:11px;font-weight:700;color:var(--t2)">−${EUR(Math.round(b.period==='annual'?item.planned/12:item.planned))}</span></div>`).join(''):''}</div>
    <div class="forecast-line" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <div class="fl-left"><span class="fl-ico">🎲</span><div><div class="fl-lbl">Dépenses variables</div><div class="fl-sub">Estimées · tap pour détail</div></div></div>
      <div class="fl-val" style="color:var(--red)">−${EUR(nmVar)}</div>
    </div>
    <div style="display:none">${b?b.items.filter(i=>i.type==='expense'&&!FIXED_CATS.has(i.cat)).map(item=>`<div style="padding:6px 16px 6px 50px;display:flex;justify-content:space-between;border-bottom:1px solid var(--bdr)"><span style="font-size:11px;color:var(--t2)">${CAT_E[item.cat]||''} ${item.cat}</span><span style="font-size:11px;font-weight:700;color:var(--red)">−${EUR(Math.round(b.period==='annual'?item.planned/12:item.planned))}</span></div>`).join(''):''}</div>
    <div class="forecast-line">
      <div class="fl-left"><span class="fl-ico">💰</span><div><div class="fl-lbl">Épargne prévue</div><div class="fl-sub">${nmRate}% des revenus</div></div></div>

const BPREV_CATS_EXP=['Logement','Transport','Alimentation','Santé','Sorties','Loisirs','Abonnements','Shopping','Autre'];
const BPREV_CATS_SAV=['Livret A','Assurance Vie','PEA','Autre épargne'];
const BPREV_CATS_INC=['Salaire','Freelance','Loyers SCPI','Dividendes PEA','Investissements','Autre'];

function getActiveBudget(){
  // Trouver le budget actif pour la période en cours
  const now=new Date();
  // Priorité : budget du mois en cours, sinon annuel
  return BUDGETS.find(b=>b.period==='monthly'&&b.year===now.getFullYear()&&b.month===now.getMonth())
      || BUDGETS.find(b=>b.period==='annual'&&b.year===now.getFullYear())
      || null;
}

function renderBudgetPrev(realInc,realExp,realSav){
  const b=getActiveBudget();
  const now=new Date();
  const monthLabel=MONTHS_L[now.getMonth()]+' '+now.getFullYear();

  if(!b){
    return`<div class="card">
      <div class="card-head" style="padding-bottom:8px">
        <div><div class="card-title">📋 Budget prévisionnel</div><div class="card-sub">Aucun budget défini</div></div>
        <button class="card-link" onclick="openBPrev()">+ Créer</button>
      </div>
      <div class="empty" style="padding:18px 16px">Définissez vos enveloppes mensuelles par catégorie pour suivre vos écarts.</div>
    </div>`;

  const periodLabel=b.period==='monthly'?`${MONTHS_L[b.month||0]} ${b.year}`:`Annuel ${b.year}`;
  const divisor=b.period==='annual'?12:1; // compare on monthly basis

  const rows=b.items.map(item=>{
    const real=item.type==='income'?realInc
               :item.type==='savings'?realSav
               :filtR('expense').filter(t=>t.cat===item.cat).reduce((s,t)=>s+t.amount,0);
    const plan=b.period==='annual'?item.planned/12:item.planned;
    const pct=plan>0?Math.round(real/plan*100):0;
    const over=real>plan&&plan>0;
    const col=item.type==='income'?'var(--blue-d)':item.type==='savings'?'var(--teal)':CAT_C[item.cat]||'#94A3B8';
    const barCol=over?'var(--red)':col;
    const ico=item.type==='income'?'💳':item.type==='savings'?'💰':(CAT_E[item.cat]||'🔹');
    return`<div class="bprev-row">
      <div class="bprev-head">
        <div class="bprev-cat"><span>${ico}</span><span>${item.cat||item.type}</span></div>
        <div class="bprev-amts">
          <div class="bprev-real" style="color:${over?'var(--red)':col}">${EUR(real)}</div>
          <div class="bprev-plan">prévu ${EUR(plan)}</div>
        </div>
      </div>
      <div class="bprev-track"><div class="bprev-fill" style="width:${Math.min(pct,100)}%;background:${barCol}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <div style="font-size:10px;font-weight:600;color:${over?'var(--red)':'var(--t2)'}">
          ${over?`⚠ +${EUR(real-plan)} dépassé`:`${pct}% utilisé`}
        </div>
        <div style="font-size:10px;color:var(--t2)">${over?'':EUR(plan-real)+' restant'}</div>
      </div>
    </div>`;
  }).join('');

  return`<div class="card">
    <div class="card-head" style="padding-bottom:4px">
      <div><div class="card-title">📋 Budget prévisionnel</div><div class="card-sub">${periodLabel}</div></div>
