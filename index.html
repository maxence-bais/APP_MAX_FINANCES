<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
:root{
  --bg:#F2F4F7;--s:#FFFFFF;
  --navy:#0F1729;--navy-l:#EEF0F8;
  --red:#F04F5B;--red-l:#FEF0F1;
  --amber:#F59E0B;--amber-l:#FEF3C7;
  --blue:#3B82F6;--blue-d:#1D4ED8;--blue-l:#EFF6FF;
  --indigo:#6366F1;--indigo-l:#EEF2FF;
  --teal:#0D9488;--teal-l:#F0FDFA;
  --violet:#7C3AED;--violet-l:#F5F3FF;
  --t1:#0F1729;--t2:#6B7280;--t3:#CBD5E1;
  --bdr:#E5E7EB;
  --r:14px;--r-sm:10px;--r-lg:20px;--r-xl:24px;
  --st:env(safe-area-inset-top,44px);
  --sb:env(safe-area-inset-bottom,20px);
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;color:var(--t1);font-size:14px;line-height:1.5;}
#app{max-width:430px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative;}
.status{height:var(--st);background:var(--s);flex-shrink:0;}
.topbar{background:var(--s);padding:10px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.app-name{font-size:19px;font-weight:800;letter-spacing:-.03em;color:var(--t1);}
.app-name span{color:var(--blue);}
.range-pill{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--bdr);border-radius:20px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--t1);}
.range-pill:active{background:var(--bdr);}
.range-pill svg{width:12px;height:12px;stroke:var(--t2);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{padding:16px 16px calc(var(--sb) + 88px);}

/* ── TABBAR ── */
.tabbar{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);padding:8px 0 calc(var(--sb) + 4px);display:flex;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;cursor:pointer;font-size:9.5px;font-weight:600;color:var(--t3);padding:2px 0;font-family:inherit;transition:color .15s;}
.tab svg{width:21px;height:21px;stroke-width:1.7;}
.tab.active{color:var(--blue);}
.tab.active svg{stroke:var(--blue);}
.tab-add{flex:0 0 56px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;padding-bottom:6px;}
.tab-add-inner{width:44px;height:44px;border-radius:14px;background:var(--navy);display:flex;align-items:center;justify-content:center;margin-top:-12px;box-shadow:0 4px 16px rgba(15,23,41,.28);}
.tab-add-inner svg{width:19px;height:19px;stroke:#fff;stroke-width:2.5;}

/* ── HERO ── */
.hero{background:var(--navy);border-radius:var(--r-xl);padding:18px 20px 16px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03);top:-40px;right:-30px;}
.hero-z{position:relative;z-index:1;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hero-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;}
.hero-toggle{display:flex;background:rgba(255,255,255,.07);border-radius:20px;padding:2px;gap:1px;}
.htog{border:none;background:transparent;color:rgba(255,255,255,.4);font-size:10px;font-weight:700;padding:4px 10px;border-radius:18px;cursor:pointer;font-family:inherit;transition:all .15s;}
.htog.on{background:rgba(255,255,255,.14);color:#fff;}
.hero-val{font-size:clamp(26px,8vw,34px);font-weight:800;color:#fff;letter-spacing:-.04em;line-height:1;margin-bottom:14px;}
.hero-row{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;gap:0;align-items:center;}
.hero-divider{width:1px;height:28px;background:rgba(255,255,255,.07);}
.hero-stat label{font-size:9px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:2px;}
.hero-stat span{font-size:clamp(10px,3vw,12px);font-weight:700;color:#fff;}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi{background:var(--s);border-radius:var(--r);padding:13px 14px;border:1px solid var(--bdr);min-width:0;}
.kpi-lbl{font-size:9.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.kpi-val{font-size:clamp(16px,5vw,21px);font-weight:800;letter-spacing:-.03em;color:var(--t1);margin-bottom:4px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.bb{background:var(--blue-l);color:var(--blue-d);}
.br{background:var(--red-l);color:var(--red);}
.ba{background:var(--amber-l);color:var(--amber);}
.bn{background:var(--navy-l);color:var(--navy);}

/* ── CARD ── */
.card{background:var(--s);border-radius:var(--r-lg);border:1px solid var(--bdr);overflow:hidden;margin-bottom:14px;}
.card-head{padding:14px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px;}
.card-title{font-size:13px;font-weight:700;color:var(--t1);}
.card-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.card-link{font-size:11px;font-weight:700;color:var(--blue);border:none;background:none;font-family:inherit;cursor:pointer;padding:0;}

/* ── CHART ── */
.chart-area{padding:10px 10px 6px;position:relative;}

/* ── TX ROW ── */
.tx-item{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--bdr);position:relative;overflow:hidden;cursor:pointer;}
.tx-item:last-child{border-bottom:none;}
.tx-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tx-body{flex:1;min-width:0;overflow:hidden;}
.tx-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--t3);margin-top:1px;}
.tx-right{flex-shrink:0;text-align:right;}
.tx-amt{font-size:14px;font-weight:700;letter-spacing:-.01em;}
.tx-del-btn{position:absolute;right:-145px;top:0;bottom:0;width:143px;display:flex;gap:0;transition:right .2s ease;}
.tx-item.swiped .tx-del-btn{right:0;}
.tx-item.swiped .tx-right{opacity:0;}
.action-edit{flex:1;background:#1D4ED8;color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}
.action-del{flex:1;background:var(--red);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}

/* ── BARS ── */
.bar-rows{padding:10px 16px 14px;display:flex;flex-direction:column;gap:12px;}
.bar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.bar-nm{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--t1);}
.bar-dot{width:8px;height:8px;border-radius:50%;}
.bar-amts{font-size:12px;color:var(--t2);}
.bar-track{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}

/* ── ASSET ROW ── */
.asset-item{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--bdr);position:relative;overflow:hidden;cursor:pointer;}
.asset-item:last-child{border-bottom:none;}
.asset-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.asset-body{flex:1;min-width:0;}
.asset-nm{font-size:13px;font-weight:600;color:var(--t1);}
.asset-tp{font-size:11px;color:var(--t3);margin-top:1px;}
.asset-right{flex-shrink:0;text-align:right;}
.asset-val{font-size:14px;font-weight:700;}
.asset-pct{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;margin-top:3px;display:inline-block;}
.asset-del{position:absolute;right:-145px;top:0;bottom:0;width:143px;display:flex;gap:0;transition:right .2s ease;}
.asset-item.swiped .asset-del{right:0;}
.asset-item.swiped .asset-right{opacity:0;}

/* ── DONUT ── */
.donut-wrap{padding:14px 16px 16px;display:flex;flex-direction:column;align-items:stretch;gap:16px;}
.donut-canvas-wrap{width:160px;height:160px;margin:0 auto;position:relative;}
.donut-canvas{width:100%!important;height:100%!important;}
.donut-legend{width:100%;display:flex;flex-direction:column;gap:9px;padding:0 2px;}
.dl-row{display:flex;align-items:center;justify-content:space-between;}
.dl-l{display:flex;align-items:center;gap:8px;}
.dl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dl-nm{font-size:12px;font-weight:600;color:var(--t1);}
.dl-r{font-size:12px;font-weight:700;color:var(--t1);}
.dl-p{font-size:11px;color:var(--t2);margin-left:4px;}

/* ── CASHFLOW MONTH ── */
.cf-month-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.cf-month-row:last-child{border-bottom:none;}
.cf-month-row:active{background:var(--bg);}
.cf-month-lbl{font-size:13px;font-weight:600;color:var(--t1);}
.cf-month-right{display:flex;align-items:center;gap:10px;}
.cf-month-val{font-size:13px;font-weight:700;}
.cf-chevron{font-size:11px;color:var(--t3);transition:transform .2s;}
.cf-chevron.open{transform:rotate(90deg);}
.cf-detail{background:var(--bg);border-bottom:1px solid var(--bdr);}
.cf-detail-row{display:flex;justify-content:space-between;padding:7px 20px;border-bottom:1px solid rgba(0,0,0,.04);}
.cf-detail-row:last-child{border-bottom:none;}
.cf-det-lbl{font-size:12px;color:var(--t2);}
.cf-det-val{font-size:12px;font-weight:600;color:var(--t1);}

/* ── POCKET CARDS ── */
.pocket{background:var(--s);border-radius:var(--r-lg);border:1px solid var(--bdr);overflow:hidden;margin-bottom:14px;}
.pocket-header{padding:14px 16px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.pocket-header:active{background:var(--bg);}
.pocket-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.pocket-info{flex:1;min-width:0;}
.pocket-name{font-size:14px;font-weight:700;color:var(--t1);}
.pocket-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.pocket-right{text-align:right;flex-shrink:0;}
.pocket-val{font-size:clamp(13px,4vw,16px);font-weight:800;color:var(--t1);}
.pocket-perf{font-size:11px;font-weight:700;margin-top:2px;}
.pocket-body{border-top:1px solid var(--bdr);}
.pocket-body.hidden{display:none;}
.p-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);}
.p-stat{background:var(--s);padding:11px 14px;}
.p-stat-lbl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.p-stat-val{font-size:15px;font-weight:700;color:var(--t1);}
.p-stat-sub{font-size:10px;color:var(--t3);margin-top:1px;}
.p-entries{padding:0;}
.p-entry{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bdr);}
.p-entry-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.p-entry-lbl{flex:1;font-size:12px;color:var(--t2);}
.p-entry-dt{font-size:11px;color:var(--t3);}
.p-entry-val{font-size:12px;font-weight:700;}
.pocket-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:none;background:transparent;width:100%;font-family:inherit;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;border-top:1px solid var(--bdr);}
.pocket-add-btn:active{background:var(--bg);}

/* ── SECTION TITLE ── */
.sec-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-top:4px;}

/* ── FILTER PILLS ── */
.fpill-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.fpill-row::-webkit-scrollbar{display:none;}
.fpill{padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--s);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.fpill.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.empty{padding:28px;text-align:center;color:var(--t3);font-size:13px;}

/* ── SHEETS ── */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(15,23,41,.4);z-index:800;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
.sheet-bg.open{display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--s);border-radius:26px 26px 0 0;width:100%;max-width:430px;max-height:85dvh;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb) + 12px);}
.sheet-handle{width:34px;height:4px;background:var(--bdr);border-radius:2px;margin:12px auto 0;}
.sheet-top{padding:14px 18px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-size:16px;font-weight:800;letter-spacing:-.02em;}
.sheet-x{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px;line-height:1;}
.sheet-body{padding:18px;}
.form-field{margin-bottom:16px;}
.f-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.f-inp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r-sm);padding:11px 14px;font-size:15px;color:var(--t1);font-family:inherit;outline:none;}
.f-inp:focus{border-color:var(--blue);}
.f-inp::placeholder{color:var(--t3);}
.seg{display:flex;gap:7px;}
.seg-o{flex:1;padding:10px 0;border-radius:var(--r-sm);border:1.5px solid var(--bdr);background:var(--s);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;text-align:center;transition:all .12s;}
.seg-o.on-exp{border-color:var(--red);background:var(--red-l);color:var(--red);}
.seg-o.on-inc{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.seg-o.on-sel{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--s);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .12s;}
.chip.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.btn-go{width:100%;padding:14px;border-radius:var(--r-sm);background:var(--navy);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn-go:active{opacity:.87;}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--sb) + 92px);left:50%;transform:translateX(-50%) translateY(6px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:all .2s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.date-sel-wrap{display:flex;gap:6px;}

// ═══ PERIOD ═══════════════════════════════════════════════════════════════════
const now=new Date();
let FROM={year:now.getFullYear(),month:Math.max(0,now.getMonth()-2)};
let TO={year:now.getFullYear(),month:now.getMonth()};
const rs=()=>new Date(FROM.year,FROM.month,1);
const re=()=>new Date(TO.year,TO.month+1,0,23,59,59,999);
const inR=tx=>{const d=new Date(tx.date);return d>=rs()&&d<=re();};
const filtR=(type='all')=>TXS.filter(t=>inR(t)&&(type==='all'||t.type===type));
const fmtR=()=>{const fs=MONTHS_S[FROM.month]+' '+FROM.year,ts=MONTHS_S[TO.month]+' '+TO.year;return FROM.year===TO.year&&FROM.month===TO.month?fs:fs+' — '+ts;};

  render();
}

function destroyChart(){if(activeChart){try{activeChart.destroy();}catch(e){}activeChart=null;}}

}

// ═══ HERO HTML ════════════════════════════════════════════════════════════════
function heroHtml(){

  const epargne=ASSETS.filter(a=>a.type==='Épargne').reduce((s,a)=>s+a.value,0);

  <div class="hero">

      <div class="hero-top">

        <div class="hero-stat"><label>Liquidités</label><span>${EUR(epargne)}</span></div>

}

function getCFMonths(){
  const months=[];
  let y=FROM.year,m=FROM.month;
  while(y<TO.year||(y===TO.year&&m<=TO.month)){
    const s=new Date(y,m,1),e=new Date(y,m+1,0,23,59,59,999);
    const inc=TXS.filter(t=>{const d=new Date(t.date);return d>=s&&d<=e&&t.type==='income';});
    const total=Math.round(inc.reduce((a,t)=>a+t.amount,0));
    // Group by cat
    const byCat={};inc.forEach(t=>{if(!byCat[t.cat])byCat[t.cat]=0;byCat[t.cat]+=t.amount;});
    months.push({key:y+'-'+m,label:MONTHS_S[m]+' '+y,total,byCat,mo:m,yr:y});
    m++;if(m>11){m=0;y++;}
  }
  return months.reverse(); // most recent first
}

  const cats=Object.entries(m.byCat).sort((a,b)=>b[1]-a[1]);
  return`
  <div class="cf-month-row" onclick="toggleCF('${m.key}')">
    <div class="cf-month-lbl">${m.label}</div>
    <div class="cf-month-right">
      <div class="cf-month-val" style="color:var(--blue-d)">${EUR(m.total)}</div>
      <div class="cf-chevron${isOpen?' open':''}">›</div>
    </div>
  </div>
  ${isOpen&&cats.length>0?`<div class="cf-detail">
    ${cats.map(([cat,val])=>`
    <div class="cf-detail-row">
      <div class="cf-det-lbl">${CAT_E[cat]||'●'} ${cat}</div>
      <div class="cf-det-val" style="color:${CAT_C[cat]||'var(--t1)'}">${EUR(Math.round(val))}</div>
    </div>`).join('')}
  </div>`:isOpen?`<div class="cf-detail"><div class="cf-detail-row"><div class="cf-det-lbl" style="color:var(--t3)">Aucune entrée ce mois</div></div></div>`:''}`;
}

function toggleCF(key){cfOpen[key]=!cfOpen[key];render();}

// ═══ BUDGET ═══════════════════════════════════════════════════════════════════
function renderBudget(){
  const inc=filtR('income').reduce((s,t)=>s+t.amount,0);
  const exp=filtR('expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  const rate=inc>0?Math.round(bal/inc*100):0;
  const cats={};filtR('expense').forEach(t=>{if(!cats[t.cat])cats[t.cat]=0;cats[t.cat]+=t.amount;});
  const catRows=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const list=filtR(budgetFilter).sort((a,b)=>new Date(b.date)-new Date(a.date));

  return`
  <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr">
    <div class="kpi"><div class="kpi-lbl">Revenus</div><div class="kpi-val" style="font-size:16px;color:var(--blue-d)">${EUR(inc)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Dépenses</div><div class="kpi-val" style="font-size:16px;color:var(--red)">${EUR(exp)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Solde</div><div class="kpi-val" style="font-size:16px;color:${bal>=0?'var(--blue-d)':'var(--red)'}">${EUR(bal)}</div></div>
  </div>
  <div class="card">
    <div class="card-head"><div><div class="card-title">Évolution</div><div class="card-sub">Mois par mois sur la période</div></div></div>
    <div class="chart-area" style="height:180px"><canvas id="main-chart"></canvas></div>
  </div>
  ${catRows.length>0?`<div class="card">
    <div class="card-head" style="padding-bottom:12px"><div><div class="card-title">Par catégorie</div><div class="card-sub">${EUR(exp)} de dépenses</div></div></div>
    <div class="bar-rows">
      ${catRows.map(([cat,val])=>{const col=CAT_C[cat]||'#94A3B8';const pct=exp>0?Math.round(val/exp*100):0;return`<div>
        <div class="bar-head"><div class="bar-nm"><div class="bar-dot" style="background:${col}"></div>${cat}</div><div class="bar-amts">${EUR(val)} <span style="color:var(--t3)">${pct}%</span></div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;}).join('')}
    </div>
  </div>`:''}
  <div style="font-size:11px;color:var(--t3);text-align:center;margin-bottom:12px">Taux d'épargne : <span style="font-weight:800;color:${rate>=20?'var(--blue-d)':rate>=10?'var(--amber)':'var(--red)'}">${rate}%</span></div>
  <div class="fpill-row">
    ${[['all','Toutes'],['income','Revenus'],['expense','Dépenses']].map(([k,l])=>`<button class="fpill${budgetFilter===k?' on':''}" onclick="setFilter('${k}')">${l}</button>`).join('')}
  </div>
  <div class="card">
    <div class="card-head" style="padding-bottom:0"><div><div class="card-title">${list.length} transaction${list.length!==1?'s':''}</div><div class="card-sub">Appuyer pour modifier / supprimer</div></div></div>
    ${list.length===0?`<div class="empty">Aucune transaction sur cette période</div>`:list.map(t=>txHtml(t,true)).join('')}
  </div>`;
}

// ═══ POCHES ═══════════════════════════════════════════════════════════════════
function renderPoches(){
  const totalInv=POCHES.reduce((s,p)=>s+p.currentValue,0);
  const totalVersé=POCHES.reduce((s,p)=>s+p.invested,0);
  const totalPV=totalInv-totalVersé;
  const perfGlob=totalVersé>0?((totalPV/totalVersé)*100):0;

  return`
  <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr">
    <div class="kpi"><div class="kpi-lbl">Total placements</div><div class="kpi-val" style="font-size:16px">${EUR(totalInv)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Versé</div><div class="kpi-val" style="font-size:16px">${EUR(totalVersé)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Plus-value</div><div class="kpi-val" style="font-size:16px;color:${totalPV>=0?'var(--blue-d)':'var(--red)'}">${EUR(totalPV)}</div><span class="badge ${perfGlob>=0?'bb':'br'}">${PCT(perfGlob)}</span></div>
  </div>
  ${POCHES.map(p=>pocketCard(p)).join('')}`;
}

function pocketCol(type){return AST_C[type]||'#94A3B8';}
function pocketEm(type){return AST_E[type]||'🔹';}
const POCKET_TYPES=['PEA','Actions','ETF','SCPI','Crypto','Assurance-Vie','Livret','Épargne salariale','Autre'];

function pocketCard(p){
  const pv=p.currentValue-p.invested;
  const perf=p.invested>0?((pv/p.invested)*100):0;
  const isOpen=pocketOpen[p.id];
  const col=pocketCol(p.type);
  const em=pocketEm(p.type);
  const entries=[...p.entries].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalDiv=entries.filter(e=>e.type==='dividende').reduce((s,e)=>s+e.amount,0);
  const positions=p.positions||[];
  const hasPositions=['Actions','ETF','Crypto'].includes(p.type);

  return`<div class="pocket">
    <div class="pocket-header" onclick="togglePocket('${p.id}')">
      <div class="pocket-ico" style="background:${col}15">${em}</div>
      <div class="pocket-info">
        <div class="pocket-name">${p.name}</div>
        <div class="pocket-sub">${p.type}${p.type==='SCPI'?` · ${p.parts||0} parts · ${p.taux||0}%/an`:positions.length>0?` · ${positions.length} ligne${positions.length>1?'s':''}`:''}${p.broker?' · '+p.broker:''}</div>
      </div>
      <div class="pocket-right">
        <div class="pocket-val">${EUR(p.currentValue)}</div>
        <div class="pocket-perf" style="color:${perf>=0?'var(--blue-d)':'var(--red)'}">${PCT(perf)} (${EUR(pv)})</div>
      </div>
    </div>
    ${isOpen?`
    <div class="pocket-body">
      <div style="display:flex;justify-content:flex-end;gap:10px;padding:8px 14px 0">
        <button onclick="openEdit('${p.id}','pocket');event.stopPropagation()" style="font-size:11px;font-weight:700;color:var(--blue);border:none;background:none;cursor:pointer;font-family:inherit">✏️ Modifier</button>
        ${hasPositions?`<button onclick="openPositionAdd('${p.id}');event.stopPropagation()" style="font-size:11px;font-weight:700;color:var(--teal);border:none;background:none;cursor:pointer;font-family:inherit">+ Ligne</button>`:''}
      </div>
      <div class="p-stat-grid">
        <div class="p-stat"><div class="p-stat-lbl">Versé total</div><div class="p-stat-val">${EUR(p.invested)}</div></div>
        <div class="p-stat"><div class="p-stat-lbl">Valeur actuelle</div><div class="p-stat-val">${EUR(p.currentValue)}</div></div>
        <div class="p-stat"><div class="p-stat-lbl">Plus-value latente</div><div class="p-stat-val" style="color:${pv>=0?'var(--blue-d)':'var(--red)'}">${EUR(pv)}</div></div>
        <div class="p-stat"><div class="p-stat-lbl">${p.type==='SCPI'?'Loyers perçus':p.type==='PEA'||hasPositions?'Dividendes':'Gains'}</div><div class="p-stat-val" style="color:${col}">${EUR(totalDiv)}</div></div>
        ${p.type==='SCPI'?`<div class="p-stat"><div class="p-stat-lbl">Nb parts</div><div class="p-stat-val">${p.parts||0}</div></div><div class="p-stat"><div class="p-stat-lbl">Prix / part</div><div class="p-stat-val">${EUR(p.prixPart||0)}</div></div>`:''}
      </div>
      ${hasPositions&&positions.length>0?`
      <div style="padding:10px 16px 4px"><div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Positions</div>
        ${positions.map(pos=>{
          const posVal=pos.qty*(pos.prixActuel||pos.pru);
          const posPv=pos.qty*(pos.prixActuel||pos.pru)-pos.qty*pos.pru;
          const posPct=pos.pru>0?(posPv/(pos.qty*pos.pru)*100):0;
          const posCol=posPv>=0?'var(--blue-d)':'var(--red)';
          return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);position:relative;">
            <div style="width:36px;height:36px;border-radius:10px;background:${col}15;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${col};flex-shrink:0">${(pos.ticker||pos.name||'?').slice(0,4).toUpperCase()}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:700;color:var(--t1)">${pos.name||pos.ticker}</div>
              <div style="font-size:11px;color:var(--t2)">${pos.qty} × ${EUR2(pos.prixActuel||pos.pru)} · PRU ${EUR2(pos.pru)}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:13px;font-weight:700;color:var(--t1)">${EUR(posVal)}</div>
              <div style="font-size:10px;font-weight:700;color:${posCol}">${posPv>=0?'+':''}${EUR(posPv)} (${posPct>=0?'+':''}${posPct.toFixed(1)}%)</div>
            </div>
            <button onclick="deletePosition('${p.id}','${pos.id}');event.stopPropagation()" style="position:absolute;top:6px;right:0;font-size:16px;background:none;border:none;cursor:pointer;color:var(--t3);line-height:1">×</button>
          </div>`;
        }).join('')}
      </div>`:''}
      <div class="p-entries">
        ${entries.slice(0,5).map(e=>{
          const ec=e.type==='versement'?col:e.type==='retrait'?'#F04F5B':e.type==='dividende'?'#0D9488':'#6366F1';
          const sign=e.type==='retrait'?'-':'+';
          const dt=new Date(e.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'2-digit'});
          return`<div class="p-entry">
            <div class="p-entry-dot" style="background:${ec}"></div>
            <div style="flex:1"><div class="p-entry-lbl">${e.label}</div><div class="p-entry-dt">${e.type} · ${dt}</div></div>
            <div class="p-entry-val" style="color:${ec}">${sign}${EUR(e.amount)}</div>
          </div>`;
        }).join('')}
      </div>
      <button class="pocket-add-btn" onclick="openPocketAdd('${p.id}')">+ Ajouter un mouvement</button>
    </div>`:''}
  </div>`;
}

function togglePocket(id){pocketOpen[id]=!pocketOpen[id];render();}
function deletePosition(pocketId,posId){
  const p=POCHES.find(x=>x.id===pocketId);if(!p)return;
  p.positions=(p.positions||[]).filter(x=>x.id!==posId);
  // recalc currentValue from positions if all positions tracked
  if((p.positions||[]).length>0)p.currentValue=p.positions.reduce((s,pos)=>s+pos.qty*(pos.prixActuel||pos.pru),0);
  save();render();toast('Position supprimée');
}

// ═══ PATRIMOINE ═══════════════════════════════════════════════════════════════
function renderPat(){
  const pochesVal=POCHES.reduce((s,p)=>s+p.currentValue,0);
  const totA=ASSETS.reduce((s,a)=>s+a.value,0)+pochesVal;
  const totL=LIABS.reduce((s,l)=>s+l.amount,0);
  const nw=totA-totL;
  const disp=heroMode==='net'?nw:totA;
  const epargne=ASSETS.filter(a=>a.type==='Épargne').reduce((s,a)=>s+a.value,0);

  const types={};
  ASSETS.forEach(a=>{if(!types[a.type])types[a.type]=0;types[a.type]+=a.value;});
  POCHES.forEach(p=>{if(!types[p.type])types[p.type]=0;types[p.type]+=p.currentValue;});
  const typeList=Object.entries(types).sort((a,b)=>b[1]-a[1]);

  // Unified sorted list of all assets
  const allItems=[
    ...ASSETS.map(a=>({kind:'asset',id:a.id,name:a.name,type:a.type,value:a.value,variation:a.variation??null,em:AST_E[a.type]||'🔹',col:AST_C[a.type]||'#94A3B8'})),
    ...POCHES.map(p=>({kind:'pocket',id:p.id,name:p.name,type:p.type,value:p.currentValue,variation:p.invested>0?(p.currentValue-p.invested)/p.invested*100:null,em:pocketEm(p.type),col:pocketCol(p.type)}))
  ].sort((a,b)=>b.value-a.value);

  return`
  <div class="hero">
    <div class="hero-z">
      <div class="hero-top">
        <div class="hero-lbl">${heroMode==='net'?'Patrimoine net':'Patrimoine brut'}</div>
        <div class="hero-toggle">
          <button class="htog${heroMode==='net'?' on':''}" onclick="setHeroMode('net')">Net</button>
          <button class="htog${heroMode==='brut'?' on':''}" onclick="setHeroMode('brut')">Brut</button>
        </div>
      </div>
      <div class="hero-val">${EUR(disp)}</div>
      <div class="hero-row">
        <div class="hero-stat"><label>Actifs</label><span style="color:#60A5FA">${EUR(totA)}</span></div>
        <div class="hero-divider"></div>
        <div class="hero-stat"><label>Passifs</label><span style="color:#F87171">${EUR(totL)}</span></div>
        <div class="hero-divider"></div>
        <div class="hero-stat"><label>Liquidités</label><span>${EUR(epargne)}</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head" style="padding-bottom:6px"><div><div class="card-title">Répartition</div><div class="card-sub">Tous les actifs</div></div></div>
    <div class="donut-canvas-wrap" style="width:160px;height:160px;margin:14px auto 6px"><canvas class="donut-canvas" id="main-chart"></canvas></div>
    <div class="bar-rows" id="donut-leg" style="padding-top:4px">
      ${typeList.map(([type,val])=>{const col=AST_C[type]||'#94A3B8';const pct=totA>0?Math.round(val/totA*100):0;return`<div>
        <div class="bar-head"><div class="bar-nm"><div class="bar-dot" style="background:${col}"></div>${type}</div><div class="bar-amts">${EUR(val)} <span style="color:var(--t2);font-weight:700">${pct}%</span></div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;}).join('')}
    </div>
  </div>

  <div class="sec-title">Actifs · ${EUR(totA)}</div>
  <div class="card" style="margin-bottom:10px">

    ${(()=>{
      // Group classic assets by type
      const byType={};
      ASSETS.forEach(a=>{if(!byType[a.type])byType[a.type]=[];byType[a.type].push(a);});
      const typeGroups=Object.entries(byType).sort((a,b)=>b[1].reduce((s,x)=>s+x.value,0)-a[1].reduce((s,x)=>s+x.value,0));

      let html='';

      // ── Sous-section par type d'actif classique ──
      typeGroups.forEach(([type,items])=>{
        const subtot=items.reduce((s,a)=>s+a.value,0);
        const col=AST_C[type]||'#94A3B8';
        const em=AST_E[type]||'🔹';
        html+=`<div style="padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)">
          <div style="display:flex;align-items:center;gap:7px">
            <div style="width:22px;height:22px;border-radius:7px;background:${col}18;display:flex;align-items:center;justify-content:center;font-size:12px">${em}</div>
            <span style="font-size:12px;font-weight:700;color:var(--t1)">${type}</span>
          </div>
          <span style="font-size:12px;font-weight:700;color:var(--t2)">${EUR(subtot)}</span>
        </div>`;
        items.forEach(a=>{
          const pct=totA>0?Math.round(a.value/totA*100):0;
          const sw=swiped[a.id];
          html+=`<div class="asset-item${sw?' swiped':''}" onclick="swipeAsset('${a.id}')" style="padding-left:42px">
            <div class="asset-body"><div class="asset-nm">${a.name}</div><div class="asset-tp">${a.type}</div></div>
            <div class="asset-right">
              <div class="asset-val">${EUR(a.value)}</div>
              <div class="asset-pct" style="background:${col}15;color:${col}">${pct}%</div>
            </div>
            <div class="asset-del">
              <button class="action-edit" onclick="openEdit('${a.id}','asset');event.stopPropagation()">✏️ Modifier</button>
              <button class="action-del" onclick="deleteItem('${a.id}','asset');event.stopPropagation()">🗑 Suppr.</button>
            </div>
          </div>`;
        });
      });

      if(ASSETS.length===0) html+='<div class="empty" style="padding:14px 16px">Aucun actif</div>';

      // ── Sous-section Placements ──
      if(POCHES.length>0){
        html+=`<div style="padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);border-top:2px solid var(--bdr);margin-top:4px">
          <div style="display:flex;align-items:center;gap:7px">
            <div style="width:22px;height:22px;border-radius:7px;background:#6366F118;display:flex;align-items:center;justify-content:center;font-size:12px">🔒</div>
            <span style="font-size:12px;font-weight:700;color:var(--t1)">Placements</span>
          </div>
          <span style="font-size:12px;font-weight:700;color:var(--t2)">${EUR(pochesVal)}</span>
        </div>`;
        POCHES.forEach(p=>{
          const col=pocketCol(p.type);const em=pocketEm(p.type);
          const pv=p.currentValue-p.invested;const perf=p.invested>0?pv/p.invested*100:0;
          const pct=totA>0?Math.round(p.currentValue/totA*100):0;
          html+=`<div class="asset-item" onclick="goTo('poches')" style="padding-left:42px">
            <div class="asset-body"><div class="asset-nm">${p.name}</div><div class="asset-tp">${p.type}</div></div>
            <div class="asset-right">
              <div class="asset-val">${EUR(p.currentValue)}</div>
              <div class="asset-pct" style="background:${perf>=0?col+'18':'var(--red-l)'};color:${perf>=0?col:'var(--red)'}">${perf>=0?'+':''}${perf.toFixed(1)}%</div>
            </div>
          </div>`;
        });
        html+=`<button onclick="goTo('poches')" style="display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;border:none;background:transparent;width:100%;font-family:inherit;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;border-top:1px solid var(--bdr)">Gérer les placements →</button>`;
      }

      return html;
    })()}

  </div>

  <div class="sec-title">Passifs · ${EUR(totL)}</div>
  <div class="card">
    ${LIABS.map(l=>liabHtml(l,totL)).join('')}
    ${LIABS.length===0?'<div class="empty">Aucun passif</div>':''}
  </div>`;
}

// ═══ ROW HELPERS ══════════════════════════════════════════════════════════════
function liabHtml(item, totL){
  const sw=swiped[item.id];
  const pct=totL>0?Math.round(item.amount/totL*100):0;
  return`<div class="asset-item${sw?' swiped':''}" onclick="swipeAsset('${item.id}')">
    <div class="asset-ico" style="background:#F04F5B18">📉</div>
    <div class="asset-body"><div class="asset-nm">${item.name}</div><div class="asset-tp">${item.type}</div></div>
    <div class="asset-right">
      <div class="asset-val" style="color:var(--red)">-${EUR(item.amount)}</div>
      <div class="asset-pct" style="background:var(--red-l);color:var(--red)">${pct}%</div>
    </div>
    <div class="asset-del">
      <button class="action-edit" onclick="openEdit('${item.id}','liab');event.stopPropagation()">✏️ Modifier</button>
      <button class="action-del" onclick="deleteItem('${item.id}','liab');event.stopPropagation()">🗑 Suppr.</button>
    </div>
  </div>`;
}

function assetHtml(item,kind,totA){
  const isL=kind==='liab';
  const col=isL?'#F04F5B':(AST_C[item.type]||'#94A3B8');
  const em=isL?'📉':(AST_E[item.type]||'●');
  const val=isL?item.amount:item.value;
  const pct=(!isL&&totA>0)?Math.round(val/totA*100):0;
  const sw=swiped[item.id];
  return`<div class="asset-item${sw?' swiped':''}" onclick="swipeAsset('${item.id}')">
    <div class="asset-ico" style="background:${col}18">${em}</div>
    <div class="asset-body"><div class="asset-nm">${item.name}</div><div class="asset-tp">${item.type}</div></div>
    <div class="asset-right">
      <div class="asset-val" style="color:${isL?'var(--red)':'var(--t1)'}">${isL?'-':''}${EUR(val)}</div>
      ${!isL?`<div class="asset-pct" style="background:var(--bg);color:var(--t2)">${pct}%</div>`:''}
    </div>
    <div class="asset-del">
      <button class="action-edit" onclick="openEdit('${item.id}','${kind}');event.stopPropagation()">✏️ Modifier</button>
      <button class="action-del" onclick="deleteItem('${item.id}','${kind}');event.stopPropagation()">🗑 Suppr.</button>
    </div>
  </div>`;
}

function txHtml(t,deletable){
  const col=CAT_C[t.cat]||'#94A3B8';

// ═══ CHART ════════════════════════════════════════════════════════════════════
function buildChart(){
  if(typeof Chart==='undefined')return; // Chart.js pas encore chargé
  if(page==='pat'){buildDonut();return;}
  buildLine();
}

function buildLine(){
  const ctx=document.getElementById('main-chart');if(!ctx)return;
  const labels=[],incD=[],expD=[];
  let y=FROM.year,m=FROM.month;
  while(y<TO.year||(y===TO.year&&m<=TO.month)){
    const s=new Date(y,m,1),e=new Date(y,m+1,0,23,59,59,999);
    labels.push(MONTHS_S[m]);
    const mo=TXS.filter(t=>{const d=new Date(t.date);return d>=s&&d<=e;});
    incD.push(Math.round(mo.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0)));
    expD.push(Math.round(mo.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0)));
    m++;if(m>11){m=0;y++;}
  }
  if(labels.length<2){labels.push('');incD.push(0);expD.push(0);}
  const mk=(c,a,b)=>{const g=c.createLinearGradient(0,0,0,200);g.addColorStop(0,a);g.addColorStop(1,b);return g;};
  activeChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {label:'Revenus',data:incD,borderColor:'#1D4ED8',borderWidth:2,backgroundColor:c=>mk(c.chart.ctx,'rgba(29,78,216,.12)','rgba(29,78,216,.01)'),tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#1D4ED8',pointBorderColor:'#fff',pointBorderWidth:2,pointHoverRadius:6},
      {label:'Dépenses',data:expD,borderColor:'#F04F5B',borderWidth:2,backgroundColor:c=>mk(c.chart.ctx,'rgba(240,79,91,.11)','rgba(240,79,91,.01)'),tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#F04F5B',pointBorderColor:'#fff',pointBorderWidth:2,pointHoverRadius:6},
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#0F1729',titleColor:'rgba(255,255,255,.5)',bodyColor:'#fff',padding:12,cornerRadius:10,callbacks:{label:c=>` ${c.dataset.label} : ${EUR(c.raw)}`}}},scales:{x:{grid:{display:false},border:{display:false},ticks:{color:'#CBD5E1',font:{size:10,family:'Plus Jakarta Sans',weight:'600'}}},y:{grid:{color:'rgba(0,0,0,.04)'},border:{display:false},ticks:{color:'#CBD5E1',font:{size:10,family:'Plus Jakarta Sans',weight:'600'},callback:v=>EUR(v)}}}}
  });
}

function buildDonut(){
  const ctx=document.getElementById('main-chart');
  if(!ctx)return;
  const types={};
  ASSETS.forEach(a=>{if(!types[a.type])types[a.type]=0;types[a.type]+=a.value;});
  POCHES.forEach(p=>{if(!types[p.type])types[p.type]=0;types[p.type]+=p.currentValue;});
  const totA=Object.values(types).reduce((s,v)=>s+v,0);
  const entries=Object.entries(types).sort((a,b)=>b[1]-a[1]);
  activeChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels:entries.map(e=>e[0]),datasets:[{data:entries.map(e=>Math.round(e[1])),backgroundColor:entries.map(e=>AST_C[e[0]]||'#94A3B8'),borderWidth:3,borderColor:'#fff',hoverOffset:5}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#0F1729',titleColor:'rgba(255,255,255,.5)',bodyColor:'#fff',padding:10,cornerRadius:8,callbacks:{label:c=>` ${EUR(c.raw)} (${Math.round(c.raw/totA*100)}%)`}}}}
  });
}

// ═══ RANGE PICKER ════════════════════════════════════════════════════════════
const YEARS=Array.from({length:11},(_,i)=>2020+i);
let rFrom={...FROM},rTo={...TO};

function openRange(){
  rFrom={...FROM};rTo={...TO};
  buildRangeUI();
  document.getElementById('range-bg').classList.add('open');
}
function closeRange(){document.getElementById('range-bg').classList.remove('open');}

function buildRangeUI(){
  const chip=(id,val,cur,onclick)=>`<button style="padding:4px 9px;border-radius:20px;border:1.5px solid ${cur===val?'var(--blue)':'var(--bdr)'};background:${cur===val?'var(--blue-l)':'var(--s)'};color:${cur===val?'var(--blue-d)':'var(--t2)'};font-size:11px;font-weight:700;cursor:pointer;font-family:inherit" onclick="${onclick}">${val}</button>`;
  ['from','to'].forEach(side=>{
    const cur=side==='from'?rFrom:rTo;
    document.getElementById(side+'-months').innerHTML=MONTHS_S.map((m,i)=>chip(side,m,MONTHS_S[cur.month],`setR('${side}','month',${i})`)).join('');
    document.getElementById(side+'-years').innerHTML=YEARS.map(y=>chip(side,y,cur.year,`setR('${side}','year',${y})`)).join('');
  });
}

function setR(side,field,val){
  if(side==='from')rFrom[field]=val;else rTo[field]=val;
  buildRangeUI();
}

function applyRange(){
  const ok=rFrom.year<rTo.year||(rFrom.year===rTo.year&&rFrom.month<=rTo.month);
  if(!ok)return toast('Début doit être avant la fin');
  FROM={...rFrom};TO={...rTo};
  closeRange();render();
}

// ═══ DATE SELECT HELPERS ══════════════════════════════════════════════════════
const DATE_YEARS=Array.from({length:8},(_,i)=>2021+i); // 2021..2028
function dateSelectHtml(inputId,defaultVal){
  const d=defaultVal?new Date(defaultVal+'T00:00:00'):new Date();
  const dy=d.getDate(),dm=d.getMonth(),dyr=d.getFullYear();
  const daysOpts=Array.from({length:31},(_,i)=>{const v=i+1;return`<option value="${v}"${v===dy?' selected':''}>${String(v).padStart(2,'0')}</option>`;}).join('');
  const monthOpts=MONTHS_L.map((m,i)=>`<option value="${i}"${i===dm?' selected':''}>${m}</option>`).join('');
  const yearOpts=DATE_YEARS.map(y=>`<option value="${y}"${y===dyr?' selected':''}>${y}</option>`).join('');
  return`<div class="date-sel-wrap"><select class="f-sel f-sel-d" id="${inputId}-day">${daysOpts}</select><select class="f-sel f-sel-m" id="${inputId}-month">${monthOpts}</select><select class="f-sel f-sel-y" id="${inputId}-year">${yearOpts}</select></div>`;
}
function getDateValue(inputId){
  const day=document.getElementById(inputId+'-day')?.value;
  const month=document.getElementById(inputId+'-month')?.value;
  const year=document.getElementById(inputId+'-year')?.value;
  if(!day||month===undefined||!year)return new Date().toISOString().split('T')[0];
  return`${year}-${String(parseInt(month)+1).padStart(2,'0')}-${String(parseInt(day)).padStart(2,'0')}`;
}

function submitPosition(){
  const ticker=(document.getElementById('pos-ticker')?.value||'').trim().toUpperCase();
  const name=(document.getElementById('pos-name')?.value||'').trim();
  const qty=parseFloat(document.getElementById('pos-qty')?.value||'');
  const pru=parseFloat(document.getElementById('pos-pru')?.value||'');

  if(!ticker)return toast('Ajoutez un ticker');
  if(!qty||qty<=0)return toast('Quantité invalide');
  if(!pru||pru<=0)return toast('PRU invalide');
  const p=POCHES.find(x=>x.id===posAddPocketId);if(!p)return;
  if(!p.positions)p.positions=[];
  p.positions.push({id:gid(),ticker,name:name||ticker,qty,pru,prixActuel:prixActuel||pru});
  // recalculate currentValue from all positions
  p.currentValue=p.positions.reduce((s,pos)=>s+pos.qty*(pos.prixActuel||pos.pru),0);
  p.invested=p.positions.reduce((s,pos)=>s+pos.qty*pos.pru,0);
  save();closePosAdd();render();toast('Ligne ajoutée ✓');
}

function submitPocketEntry(){
  const label=(document.getElementById('pe-label')?.value||'').trim();
  const amount=parseFloat(document.getElementById('pe-amount')?.value||'');

  const newval=parseFloat(document.getElementById('pe-newval')?.value||'');

  const p=POCHES.find(x=>x.id===pocketAddId);if(!p)return;
  p.entries.push({id:gid(),date,type:pocketEntryType,label,amount});
  if(pocketEntryType==='versement'){p.invested+=amount;if(newval>0)p.currentValue=newval;}

  if(pocketEntryType==='plus-value'&&newval>0)p.currentValue=newval;
  save();closePocketAdd();render();toast('Mouvement enregistré ✓');
}

    <div class="form-field"><div class="f-lbl">Variation (% · optionnel)</div><input class="f-inp" id="e-variation" type="number" inputmode="decimal" step="0.1" placeholder="Ex : 5.2 ou -3.1" value="${a.variation!=null?a.variation:''}"></div>
    <div class="form-field"><div class="f-lbl">Type</div>
      <div class="chip-row">${aTypes.map(c=>`<button class="chip${editCat===c?' on':''}" onclick="setECat('${c}')">${c}</button>`).join('')}</div>
    </div>`;
  } else if(editKind==='liab'){
    const l=LIABS.find(x=>x.id===editId); if(!l)return;
    editCat=l.type;
    html=`
    <div class="form-field"><div class="f-lbl">Nom du passif</div><input class="f-inp" id="e-name" value="${l.name}" autocorrect="off"></div>
    <div class="form-field"><div class="f-lbl">Montant restant (€)</div><input class="f-inp" id="e-amount" type="number" inputmode="decimal" value="${l.amount}"></div>
    <div class="form-field"><div class="f-lbl">Type</div>
      <div class="chip-row">${lTypes.map(c=>`<button class="chip${editCat===c?' on':''}" onclick="setECat('${c}')">${c}</button>`).join('')}</div>
    </div>`;
  } else if(editKind==='pocket'){
    const p=POCHES.find(x=>x.id===editId); if(!p)return;
    html=`
    <div class="form-field"><div class="f-lbl">Nom de la poche</div><input class="f-inp" id="e-name" value="${p.name}" autocorrect="off"></div>
    <div class="form-field"><div class="f-lbl">Valeur actuelle (€)</div><input class="f-inp" id="e-curval" type="number" inputmode="decimal" value="${p.currentValue}"></div>
    <div class="form-field"><div class="f-lbl">Montant total versé (€)</div><input class="f-inp" id="e-invested" type="number" inputmode="decimal" value="${p.invested}"></div>
    ${p.type==='SCPI'?`
    <div class="form-field"><div class="f-lbl">Nombre de parts</div><input class="f-inp" id="e-parts" type="number" inputmode="decimal" value="${p.parts}"></div>
    <div class="form-field"><div class="f-lbl">Prix par part (€)</div><input class="f-inp" id="e-prixpart" type="number" inputmode="decimal" value="${p.prixPart}"></div>
    <div class="form-field"><div class="f-lbl">Taux de rendement (%/an)</div><input class="f-inp" id="e-taux" type="number" inputmode="decimal" step="0.01" value="${p.taux}"></div>`:''}`;
  }

  document.getElementById('edit-body').innerHTML=html+`<button class="btn-go" onclick="submitEdit()" style="margin-top:4px">Enregistrer les modifications</button>`;
}

function setETxType(t){
  editTxType=t; editCat='';
  renderEditForm();
}
function setECat(c){
  editCat=c;
  // Re-render just the chips without full re-render to keep input values
  document.querySelectorAll('#edit-body .chip').forEach(btn=>{
    btn.classList.toggle('on', btn.textContent===c);
  });
}

function submitEdit(){
  if(editKind==='tx'){
    const tx=TXS.find(t=>t.id===editId); if(!tx)return;
    const label=(document.getElementById('e-label')?.value||'').trim();
    const amount=parseFloat(document.getElementById('e-amount')?.value||'');
    const date=getDateValue('e-date');
    if(!label)return toast('Ajoutez un libellé');
    if(!amount||amount<=0)return toast('Montant invalide');
    if(!editCat)return toast('Choisissez une catégorie');
    tx.label=label; tx.amount=amount; tx.date=date; tx.type=editTxType; tx.cat=editCat;
  } else if(editKind==='asset'){
    const a=ASSETS.find(x=>x.id===editId); if(!a)return;
    const name=(document.getElementById('e-name')?.value||'').trim();
    const value=parseFloat(document.getElementById('e-amount')?.value||'');
    const variationRaw=document.getElementById('e-variation')?.value;
    const variation=variationRaw!==''&&variationRaw!=null?parseFloat(variationRaw):null;
    if(!name)return toast('Ajoutez un nom');
    if(!value||value<=0)return toast('Valeur invalide');
    if(!editCat)return toast('Choisissez un type');
    a.name=name; a.value=value; a.type=editCat; a.variation=isNaN(variation)?null:variation;
  } else if(editKind==='liab'){
    const l=LIABS.find(x=>x.id===editId); if(!l)return;
    const name=(document.getElementById('e-name')?.value||'').trim();
    const amount=parseFloat(document.getElementById('e-amount')?.value||'');
    if(!name)return toast('Ajoutez un nom');
    if(!amount||amount<=0)return toast('Montant invalide');
    if(!editCat)return toast('Choisissez un type');
    l.name=name; l.amount=amount; l.type=editCat;
  } else if(editKind==='pocket'){
    const p=POCHES.find(x=>x.id===editId); if(!p)return;
    const name=(document.getElementById('e-name')?.value||'').trim();
    const curval=parseFloat(document.getElementById('e-curval')?.value||'');
    const invested=parseFloat(document.getElementById('e-invested')?.value||'');
    if(!name)return toast('Ajoutez un nom');
    if(!curval||curval<0)return toast('Valeur invalide');
    p.name=name; p.currentValue=curval;
    if(invested>=0)p.invested=invested;
    if(p.type==='SCPI'){
      const parts=parseInt(document.getElementById('e-parts')?.value||'');
      const prixPart=parseFloat(document.getElementById('e-prixpart')?.value||'');
      const taux=parseFloat(document.getElementById('e-taux')?.value||'');
      if(parts>0)p.parts=parts;
      if(prixPart>0)p.prixPart=prixPart;
      if(taux>0)p.taux=taux;
    }
  }
  save(); closeEdit(); render(); toast('Modifié ✓');
}


function swipeTx(id){swiped[id]=!swiped[id];render();}
function swipeAsset(id){swiped[id]=!swiped[id];render();}
function deleteTx(id){TXS=TXS.filter(t=>t.id!==id);swiped={};save();render();toast('Supprimé');}
function deleteItem(id,kind){
  if(kind==='asset')ASSETS=ASSETS.filter(a=>a.id!==id);
  else LIABS=LIABS.filter(l=>l.id!==id);
  swiped={};save();render();toast('Supprimé');
}
function setFilter(f){budgetFilter=f;render();}

// ═══ TOAST ════════════════════════════════════════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),2200);
}

// ═══ INIT — charge Chart.js de façon non-bloquante puis lance l'app ══════════
function _boot(){
  // render immédiatement sans les graphiques
  render();
  // puis charge Chart.js dynamiquement
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  s.onload=()=>{ try{render();}catch(e){} };
  s.onerror=()=>{ /* Chart.js indisponible, les écrans fonctionnent quand même */ };
  document.head.appendChild(s);
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',_boot);
}else{
  _boot();
}
</script>
</body>
</html>
